<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galerie Pneus Maroc</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#0f172a;
color:white;
}

.container{
width:90%;
max-width:1200px;
margin:auto;
padding:40px 0;
}

h1{
text-align:center;
font-size:40px;
margin-bottom:10px;
}

p{
text-align:center;
color:#94a3b8;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
margin-top:40px;
}

.card{
background:#1e293b;
border-radius:15px;
padding:20px;
transition:0.3s;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.card:hover{
transform:translateY(-8px);
}

.brand{
font-size:18px;
font-weight:bold;
color:#38bdf8;
margin-bottom:10px;
}

.size{
display:block;
color:#facc15;
font-size:14px;
margin:3px 0;
}

.btn{
margin-top:10px;
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
cursor:pointer;
}

.btn:hover{
background:#2563eb;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
font-size:22px;
color:white;
text-decoration:none;
}

.search{
width:100%;
padding:15px;
border-radius:10px;
border:none;
margin-top:20px;
font-size:16px;
}

</style>
</head>

<body>

<div class="container">

<h1>🛞 Galerie Pneus Maroc</h1>
<p>Choisis ta voiture et commande directement</p>

<input class="search" id="search" placeholder="Rechercher voiture..." onkeyup="filterCars()">

<div class="grid" id="grid"></div>

</div>

<a class="whatsapp" href="#" onclick="openWhatsApp()">💬</a>

<script>

const cars = [

{brand:"Renault Clio 4 / 5", sizes:["185/65 R15","195/55 R16"]},
{brand:"Renault Megane 3 / 4", sizes:["195/65 R15","205/55 R16","225/45 R17"]},
{brand:"Dacia Logan", sizes:["165/80 R14","185/65 R15"]},
{brand:"Dacia Duster", sizes:["215/65 R16","215/60 R17","225/60 R17"]},

{brand:"VW Golf 6 / 7 / 8", sizes:["195/65 R15","205/55 R16","225/45 R17","225/40 R18"]},
{brand:"VW Polo", sizes:["175/70 R14","185/65 R15","195/55 R16"]},
{brand:"VW Passat", sizes:["215/60 R16","215/55 R17","235/45 R18"]},

{brand:"Peugeot 208", sizes:["185/65 R15","195/55 R16"]},
{brand:"Peugeot 308", sizes:["195/65 R15","205/55 R16","225/45 R17"]},
{brand:"Peugeot 508", sizes:["215/60 R16","215/55 R17","235/45 R18"]},

{brand:"Toyota Corolla", sizes:["195/65 R15","205/55 R16","225/45 R17"]},
{brand:"Toyota Yaris", sizes:["175/65 R15","185/60 R15","195/50 R16"]},
{brand:"Toyota Prado", sizes:["265/65 R17","265/60 R18","275/55 R19"]},

{brand:"Hyundai i20", sizes:["185/65 R15","195/55 R16"]},
{brand:"Hyundai Tucson", sizes:["225/60 R17","225/55 R18","235/55 R19"]},
{brand:"Kia Sportage", sizes:["215/70 R16","225/60 R17","235/55 R18"]}

];

function render(list){

let grid=document.getElementById("grid");
grid.innerHTML="";

list.forEach(car=>{

grid.innerHTML += `
<div class="card">
<div class="brand">${car.brand}</div>
<div>🛞 Sizes:</div>
${car.sizes.map(s=>`<span class="size">${s}</span>`).join("")}
<button class="btn" onclick="order('${car.brand}')">Commander</button>
</div>
`;

});

}

function filterCars(){

let input=document.getElementById("search").value.toLowerCase();

let filtered=cars.filter(c =>
c.brand.toLowerCase().includes(input)
);

render(filtered);

}

function order(car){

let phone="212622251754";
let msg="Bonjour, je veux commander des pneus pour: "+car;

window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);

}

function openWhatsApp(){

let phone="212622251754";
let msg="Bonjour, je cherche des pneus.";

window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);

}

// init
render(cars);

</script>

</body>
</html>
