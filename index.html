<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khatra | Ultra Premium Coffee</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        :root { --gold: #c68b59; --dark: #0a0a0a; --glass: rgba(255, 255, 255, 0.05); }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Montserrat', sans-serif; cursor: none; }
        body { background: var(--dark); color: #fff; overflow-x: hidden; }

        /* Cursor */
        .cursor { width: 20px; height: 20px; border: 2px solid var(--gold); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transition: transform 0.1s; }

        /* Pattern Background (Zellige Inspiration) */
        .pattern-bg { 
            position: fixed; inset: 0; z-index: -1; opacity: 0.05;
            background-image: radial-gradient(var(--gold) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* Hero */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(4rem, 15vw, 8rem); color: var(--gold); text-transform: uppercase; line-height: 0.9; }
        
        .btn {
            padding: 20px 50px; background: transparent; border: 1px solid var(--gold); color: var(--gold);
            text-transform: uppercase; letter-spacing: 4px; cursor: pointer; transition: 0.3s;
            margin-top: 30px; position: relative; overflow: hidden;
        }
        .btn:hover { background: var(--gold); color: #000; box-shadow: 0 0 40px var(--gold); }

        /* Sections */
        .section { padding: 150px 10%; perspective: 1000px; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }
        
        .card {
            background: var(--glass); padding: 50px; border: 1px solid rgba(198, 139, 89, 0.2);
            backdrop-filter: blur(20px); text-align: center; transition: 0.5s; border-radius: 20px;
            transform-style: preserve-3d;
        }
        .card:hover { transform: translateY(-20px) rotateY(10deg); border-color: var(--gold); }
        .card h3 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 32px; margin-bottom: 15px; }

        /* Cart */
        .cart-box { 
            position: fixed; bottom: 40px; right: 40px; background: rgba(0,0,0,0.8); 
            padding: 20px; border: 1px solid var(--gold); border-radius: 20px; z-index: 999;
            backdrop-filter: blur(10px); animation: float 3s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>
    <div class="cursor"></div>
    <div class="pattern-bg"></div>

    <div class="hero">
        <h1 id="title">Khatra</h1>
        <p id="subtitle">ULTRA PREMIUM COFFEE</p>
        <button class="btn" onclick="document.getElementById('menu').scrollIntoView({behavior:'smooth'})">Explore Selection</button>
    </div>

    <div class="section" id="menu">
        <h2 style="font-family: 'Playfair Display', serif; text-align: center; margin-bottom: 80px; font-size: 3rem; color: var(--gold);">Our Selection</h2>
        <div class="menu-grid">
            <div class="card" onclick="add('Espresso Elite')"><h3>Espresso Elite</h3><p>Intense, bold, and pure.</p><h4 style="margin-top:20px; color:var(--gold);">15 MAD</h4></div>
            <div class="card" onclick="add('Cappuccino')"><h3>Cappuccino</h3><p>Velvety foam, rich espresso.</p><h4 style="margin-top:20px; color:var(--gold);">22 MAD</h4></div>
            <div class="card" onclick="add('Signature Latte')"><h3>Signature Latte</h3><p>Creamy perfection in a cup.</p><h4 style="margin-top:20px; color:var(--gold);">25 MAD</h4></div>
        </div>
    </div>

    <div class="cart-box">
        <h3>🛒 Order</h3>
        <div id="cart-list"></div>
        <button class="btn" style="padding:10px 20px; margin-top:10px; font-size: 10px;" onclick="checkout()">WhatsApp Checkout</button>
    </div>

    <script>
        // Custom Cursor
        window.addEventListener('mousemove', e => {
            gsap.to('.cursor', { x: e.clientX, y: e.clientY, duration: 0.1 });
        });

        // Animations
        gsap.from("#title", { y: 100, opacity: 0, duration: 1.5, ease: "power4.out" });
        gsap.from("#subtitle", { y: 50, opacity: 0, duration: 1.5, delay: 0.3 });

        ScrollTrigger.batch(".card", {
            onEnter: batch => gsap.to(batch, { opacity: 1, y: 0, stagger: 0.2 }),
            start: "top 80%"
        });

        let cart = [];
        function add(item) { 
            cart.push(item); 
            gsap.fromTo('.cart-box', { scale: 1 }, { scale: 1.1, duration: 0.1, yoyo: true, repeat: 1 });
            render(); 
        }
        function render() {
            document.getElementById("cart-list").innerHTML = cart.map(c => `<div style="font-size:12px; margin:5px 0;">☕ ${c}</div>`).join("");
        }
        function checkout() {
            let msg = "Order Request: " + cart.join(", ");
            window.location.href = "https://wa.me/212678673336?text=" + encodeURIComponent(msg);
        }
    </script>
</body>
</html>
