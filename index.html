<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ki Shop Perfumes</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#050505;
  color:white;
}

/* HERO */
.hero{
  text-align:center;
  padding:80px 20px;
  background:linear-gradient(135deg,#000,#111);
}

.hero h1{
  font-size:3rem;
  color:#ffd700;
}

.badge{
  background:red;
  display:inline-block;
  padding:5px 12px;
  border-radius:20px;
  margin-top:10px;
  font-size:0.9rem;
}

/* TIMER */
#timer{
  font-size:1.2rem;
  color:#ffd700;
  margin-top:10px;
}

/* GRID */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:20px;
  padding:30px;
}

.card{
  background:#111;
  padding:15px;
  border-radius:15px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
}

.card img{
  width:100%;
  border-radius:10px;
}

.card:hover{
  transform:scale(1.05);
}

.selected{
  border:2px solid gold;
}

/* VIDEO */
.video{
  text-align:center;
  padding:30px;
}

.video iframe{
  width:90%;
  height:250px;
  border-radius:15px;
}

/* REVIEWS */
.reviews{
  padding:30px;
}

.review{
  background:#111;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
}

/* FORM */
.form{
  padding:30px;
}

input,button{
  width:100%;
  padding:15px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

input{
  background:#111;
  color:white;
}

button{
  background:#ffd700;
  font-weight:bold;
  cursor:pointer;
}

/* FOOTER INFO */
.footer{
  text-align:center;
  padding:20px;
  color:#aaa;
}

/* ANIMATION */
.fade{
  opacity:0;
  transform:translateY(30px);
  transition:1s;
}

.show{
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<div class="hero">
  <h1>Ki Shop Perfumes</h1>
  <p>20 عطر فاخر بثمن 49dh فقط 🔥</p>
  <div class="badge">OFFRE LIMITÉE</div>
  <div id="timer"></div>
  <p>🔥 +1000 clients satisfaits</p>
</div>

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<!-- VIDEO -->
<div class="video fade">
  <h2>🎥 شاهد الجودة</h2>
  <iframe src="https://www.youtube.com/embed/VIDEO_ID"></iframe>
</div>

<!-- REVIEWS -->
<div class="reviews fade">
  <h2>⭐ آراء الزبناء</h2>

  <div class="review">⭐⭐⭐⭐⭐ - محمد: عطر زوين وبثمن رخيص 😍</div>
  <div class="review">⭐⭐⭐⭐⭐ - سارة: توصيل سريع وجودة ممتازة</div>
  <div class="review">⭐⭐⭐⭐ - يوسف: غادي نعاود نطلب 👍</div>

</div>

<!-- FORM -->
<div class="form fade">
  <h2>اطلب دابا</h2>
  <input id="name" placeholder="الاسم">
  <input id="phone" placeholder="رقم الهاتف">
  <button onclick="sendOrder()">إرسال عبر واتساب</button>
</div>

<div class="footer">
  الدفع عند الاستلام 🚚 | توصيل لجميع المدن
</div>

<script>

let perfumes = [
"Amber","Oud Royal","Rose Musk","Vanilla Dream","Black Orchid",
"White Musk","Jasmine Gold","Ocean Fresh","Night Intense","Sweet Candy",
"Dark Wood","Royal Gold","Cherry Love","Fresh Lemon","Spicy Oud",
"Blue Sky","Coffee Mix","Floral Touch","Magic Night","Luxury Mix"
];

let selected = [];

let container = document.getElementById("products");

perfumes.forEach((p,i)=>{
  let div = document.createElement("div");
  div.className="card fade";

  div.innerHTML = `
    <img src="https://picsum.photos/200?random=${i}">
    <p>${p}</p>
    <strong>49dh</strong>
  `;

  div.onclick=()=>{
    div.classList.toggle("selected");

    if(selected.includes(p)){
      selected = selected.filter(x=>x!==p);
    }else{
      selected.push(p);
    }
  }

  container.appendChild(div);
});

function sendOrder(){
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;

  if(name==="" || phone==="" || selected.length===0){
    alert("عمر المعلومات كاملة");
    return;
  }

  let text = `طلب جديد - Ki Shop Perfumes
الاسم: ${name}
الهاتف: ${phone}
العطور: ${selected.join(", ")}
المجموع: ${selected.length*49} DH`;

  let url = "https://wa.me/212600315821?text=" + encodeURIComponent(text);

  window.open(url);
}

/* TIMER */
let time = 3600;
setInterval(()=>{
  let m = Math.floor(time/60);
  let s = time%60;
  document.getElementById("timer").innerText = `ينتهي العرض خلال ${m}:${s}`;
  time--;
},1000);

/* ANIMATION SCROLL */
let elements = document.querySelectorAll(".fade");

window.addEventListener("scroll",()=>{
  elements.forEach(el=>{
    let pos = el.getBoundingClientRect().top;
    if(pos < window.innerHeight){
      el.classList.add("show");
    }
  });
});

</script>

</body>
</html>
