<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ADHEN CREPES | Premium Taste</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;800&display=swap" rel="stylesheet" />

<style>

:root{
--primary:#ff9f1c;
--secondary:#2ec4b6;
--dark-bg:#0f1014;
--card-bg:#1c1e26;
--text-color:#ffffff;
--glass:rgba(255,255,255,0.05);
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
background-color:var(--dark-bg);
background-image:radial-gradient(circle at top right,#2a2a2a 0%,#0f1014 60%);
color:var(--text-color);
font-family:'Tajawal',sans-serif;
text-align:center;
overflow-x:hidden;
padding-bottom:100px;
}

header{
padding:40px 20px;
}

.logo{
font-size:3rem;
font-weight:800;
color:var(--primary);
opacity:0;
transform:translateY(30px);
animation:fadeUp 1s forwards .5s;
}

.tagline{
font-size:1.1rem;
color:#aaa;
opacity:0;
animation:fadeUp 1s forwards .8s;
}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}

.container{
max-width:1200px;
margin:auto;
padding:0 20px;
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
margin-top:40px;
opacity:0;
transform:translateY(50px);
transition:1s;
}

.menu.show{
opacity:1;
transform:translateY(0);
}

.card{
background:var(--card-bg);
border-radius:20px;
overflow:hidden;
cursor:pointer;
}

.card-img-wrapper{
height:200px;
overflow:hidden;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

.card-content{
padding:20px;
text-align:right;
}

.price-tag{
background:rgba(255,159,28,.1);
color:var(--primary);
padding:6px 15px;
border-radius:30px;
font-weight:bold;
}

.cart-float{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:linear-gradient(45deg,#ff9f1c,#ff7a00);
padding:15px 35px;
border-radius:40px;
cursor:pointer;
display:flex;
gap:10px;
font-weight:bold;
}

.counter-badge{
background:white;
color:#ff7a00;
width:22px;
height:22px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:13px;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
opacity:0;
pointer-events:none;
transition:.3s;
}

.overlay.active{
opacity:1;
pointer-events:auto;
}

.cart-sidebar{
position:fixed;
top:0;
left:-100%;
width:100%;
max-width:400px;
height:100vh;
background:#16181f;
padding:25px;
transition:.4s;
display:flex;
flex-direction:column;
}

.cart-sidebar.open{
left:0;
}

.cart-header{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.close-cart{
background:none;
border:none;
color:white;
font-size:24px;
cursor:pointer;
}

.cart-items{
flex:1;
overflow:auto;
margin-bottom:15px;
}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,.05);
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

.qty-controls{
display:flex;
align-items:center;
gap:8px;
}

.qty-btn{
background:linear-gradient(45deg,#ff9f1c,#ff7a00);
border:none;
color:white;
width:28px;
height:28px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.cart-total{
font-size:20px;
color:var(--primary);
margin-bottom:10px;
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:#222;
color:white;
}

.btn-whatsapp{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:#25d366;
color:white;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<h1 class="logo">ADHEN CREPES</h1>
<p class="tagline">أفضل كريب في المدينة</p>
</header>

<div class="container">
<div class="menu" id="menu"></div>
</div>

<button class="cart-float" onclick="toggleCart()">
🛒 الطلب
<span class="counter-badge" id="counter">0</span>
</button>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<aside class="cart-sidebar" id="cart">

<div class="cart-header">
<h2>طلبك الحالي</h2>
<button class="close-cart" onclick="toggleCart()">✕</button>
</div>

<div class="cart-items" id="items"></div>

<div class="cart-total">
المجموع: <span id="total">0</span> درهم
</div>

<input id="name" placeholder="اسمك">

<button class="btn-whatsapp" onclick="send()">
إرسال الطلب عبر واتساب
</button>

</aside>

<script>

const foods=[
{name:"كريب لوتس",price:18,img:"https://images.unsplash.com/photo-1519671482749-fd09be7ccebf"},
{name:"كريب نوتيلا",price:15,img:"https://images.unsplash.com/photo-1587731556938-38755b4803a6"},
{name:"عصير فراولة",price:15,img:"https://images.unsplash.com/photo-1553530666-ba11a7da3888"}
];

let order={}
let total=0

const menu=document.getElementById("menu")
const items=document.getElementById("items")

function renderMenu(){

let html=""

foods.forEach(f=>{

html+=`
<div class="card" onclick="add('${f.name}',${f.price})">

<div class="card-img-wrapper">
<img src="${f.img}">
</div>

<div class="card-content">
<h3>${f.name}</h3>
<span class="price-tag">${f.price} درهم</span>
</div>

</div>
`

})

menu.innerHTML=html

}

function add(name,price){

if(order[name]) order[name]++
else order[name]=1

update()

}

function remove(name){

order[name]--

if(order[name]<=0) delete order[name]

update()

}

function update(){

items.innerHTML=""

total=0
let count=0

for(let name in order){

let food=foods.find(f=>f.name===name)

let qty=order[name]

let line=qty*food.price

total+=line
count+=qty

items.innerHTML+=`

<div class="cart-item">

<div class="qty-controls">

<button class="qty-btn" onclick="remove('${name}')">-</button>

<span>${qty}</span>

<button class="qty-btn" onclick="add('${name}',${food.price})">+</button>

</div>

<span>${name}</span>

<span>${line}dh</span>

</div>

`

}

document.getElementById("counter").innerText=count
document.getElementById("total").innerText=total

}

function toggleCart(){

document.getElementById("cart").classList.toggle("open")
document.getElementById("overlay").classList.toggle("active")

}

function send(){

let name=document.getElementById("name").value

if(!name){
alert("ادخل اسمك")
return
}

let msg="مرحبا، اسمي "+name+"%0A%0A"

for(let i in order){

msg+=order[i]+" × "+i+"%0A"

}

msg+="%0Aالمجموع: "+total+" درهم"

window.open("https://wa.me/212774475007?text="+msg)

}

renderMenu()

setTimeout(()=>{

menu.classList.add("show")

},300)

</script>

</body>
</html>
