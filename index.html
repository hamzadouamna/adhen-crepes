<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khatra Shop ☕</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Inter;
background:#120b0b;
color:#fff;
}

nav{
display:flex;
justify-content:space-between;
padding:20px;
background:#000;
position:sticky;
top:0;
}

nav span{color:#C68B59}

.hero{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:60px;
}

.hero span{color:#C68B59}

.btn{
margin-top:20px;
padding:14px 30px;
background:#C68B59;
border:none;
border-radius:30px;
font-weight:bold;
cursor:pointer;
}

.section{
padding:60px 20px;
text-align:center;
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
max-width:900px;
margin:auto;
}

.card{
background:#1a1a1a;
padding:20px;
border-radius:12px;
}

.price{color:#C68B59}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
}

.whatsapp a{
background:#25D366;
padding:14px 18px;
border-radius:50px;
color:#fff;
text-decoration:none;
font-weight:bold;
}

</style>
</head>

<body>

<nav>
<h2><span>KHATRA</span> SHOP</h2>
</nav>

<div class="hero">
<h1>KHATRA <span>COFFEE</span></h1>
<p>Premium coffee experience</p>

<button class="btn"
onclick="window.location.href='https://wa.me/212678673336?text=I%20want%20order%20from%20Khatra%20Shop'">
Order Now
</button>
</div>

<div class="section">
<h2>Menu</h2>

<div class="menu">

<div class="card">
<h3>Espresso</h3>
<p class="price">15 MAD</p>
</div>

<div class="card">
<h3>Cappuccino</h3>
<p class="price">22 MAD</p>
</div>

<div class="card">
<h3>Latte</h3>
<p class="price">25 MAD</p>
</div>

<div class="card">
<h3>Cold Brew</h3>
<p class="price">28 MAD</p>
</div>

</div>
</div>

<div class="whatsapp">
<a href="https://wa.me/212678673336">WhatsApp</a>
</div>

</body>
</html>
