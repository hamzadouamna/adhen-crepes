<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khatra Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}

body{
background:#070707;
color:#fff;
overflow-x:hidden;
}

/* GLOW */
body::before{
content:"";
position:fixed;
width:500px;
height:500px;
background:radial-gradient(circle,#d4a24c,transparent 60%);
filter:blur(140px);
top:-100px;
left:-100px;
opacity:0.3;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
padding:20px 40px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
position:sticky;
top:0;
border-bottom:1px solid #222;
}

nav h1{
font-weight:800;
letter-spacing:2px;
}

nav h1 span{
color:#d4a24c;
}

/* HERO */
.hero{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:70px;
font-weight:900;
letter-spacing:-2px;
}

.hero h1 span{
color:#d4a24c;
}

.hero p{
opacity:0.7;
margin-top:10px;
max-width:500px;
}

.btn{
margin-top:25px;
padding:14px 30px;
background:#d4a24c;
border:none;
border-radius:50px;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 25px #d4a24c;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
}

/* MENU */
.section{
padding:80px 20px;
text-align:center;
}

.section h2{
font-size:40px;
color:#d4a24c;
margin-bottom:30px;
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
max-width:900px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:15px;
border:1px solid #222;
transition:0.3s;
}

.card:hover{
border-color:#d4a24c;
transform:translateY(-8px);
box-shadow:0 0 20px #d4a24c;
}

.price{
color:#d4a24c;
margin-top:10px;
}

/* CTA */
.cta{
background:#d4a24c;
color:#000;
padding:60px 20px;
text-align:center;
margin-top:50px;
}

.cta h2{
font-size:35px;
}

footer{
text-align:center;
padding:20px;
opacity:0.5;
font-size:13px;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
}

.whatsapp a{
background:#25D366;
color:#fff;
padding:14px 18px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
box-shadow:0 0 20px #25D366;
}

</style>
</head>

<body>

<nav>
<h1><span>KHATRA</span> SHOP</h1>
<div>
<a href="#" style="color:#aaa;text-decoration:none">Home</a>
<a href="#menu" style="color:#aaa;text-decoration:none;margin-left:10px">Menu</a>
</div>
</nav>

<div class="hero">
<h1>KHATRA <span>SHOP</span></h1>
<p>Premium coffee experience with street luxury identity</p>

<button class="btn"
onclick="window.location.href='https://wa.me/212636061058?text=I%20want%20order%20from%20Khatra%20Shop'">
Order Now
</button>
</div>

<div class="section" id="menu">
<h2>Menu</h2>

<div class="menu">

<div class="card">
<h3>Espresso Khatra</h3>
<p class="price">15 MAD</p>
</div>

<div class="card">
<h3>Velvet Cappuccino</h3>
<p class="price">22 MAD</p>
</div>

<div class="card">
<h3>Golden Latte</h3>
<p class="price">25 MAD</p>
</div>

<div class="card">
<h3>Cold Brew Noir</h3>
<p class="price">28 MAD</p>
</div>

</div>
</div>

<div class="cta">
<h2>KHATRA SHOP EXPERIENCE ☕</h2>
<p>Luxury taste. Street identity. Fast service.</p>
</div>

<footer>
© Khatra Shop 2026
</footer>

<div class="whatsapp">
<a href="https://wa.me/212636061058">WhatsApp</a>
</div>

</body>
</html>
