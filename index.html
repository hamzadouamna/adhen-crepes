<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pneus Maroc | IT BLUE</title>
<meta name="description" content="Meilleur service de pneus au Maroc. Montage rapide, prix imbattables. Réservez maintenant.">

<!-- SEO -->
<meta name="keywords" content="pneus maroc, pneus rabat, montage pneus maroc">

<!-- Open Graph -->
<meta property="og:title" content="Pneus Premium Maroc">
<meta property="og:image" content="https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
:root{
--primary:#3b82f6;
--dark:#0f172a;
--card:#1e293b;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{background:var(--dark);color:white;}

.container{width:90%;max-width:1200px;margin:auto;}

.hero{
height:100vh;
display:flex;
align-items:center;
background:url('https://images.unsplash.com/photo-1616789916437-bbf724d6c0a7') center/cover;
}

.hero-content{max-width:600px;}

.hero h1{font-size:50px;}
.hero p{margin:20px 0;}

.btn{
background:var(--primary);
padding:15px 30px;
border-radius:30px;
border:none;
cursor:pointer;
color:white;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:40px;
}

.card{
background:var(--card);
padding:25px;
border-radius:15px;
transition:.3s;
}

.card:hover{transform:scale(1.05);}

section{padding:80px 0;}

input,select{
width:100%;
padding:15px;
margin:10px 0;
border-radius:10px;
border:none;
}

form{
background:var(--card);
padding:30px;
border-radius:20px;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
<div class="container hero-content">
<h1>Pneus Haute Qualité au Maroc</h1>
<p>Montage rapide - Service professionnel - Prix compétitifs</p>
<button class="btn" onclick="scrollToForm()">Réserver maintenant</button>
</div>
</section>

<!-- SERVICES -->
<section class="container">
<h2>Nos Services</h2>
<div class="grid">
<div class="card">Montage pneus</div>
<div class="card">Équilibrage</div>
<div class="card">Parallélisme</div>
<div class="card">Réparation crevaison</div>
</div>
</section>

<!-- TRUST -->
<section class="container">
<h2>Pourquoi nous ?</h2>
<div class="grid">
<div class="card">+500 clients satisfaits</div>
<div class="card">Service rapide</div>
<div class="card">Prix compétitifs</div>
<div class="card">Garantie qualité</div>
</div>
</section>

<!-- FORM -->
<section class="container" id="form">
<h2>Réserver maintenant</h2>

<form onsubmit="sendLead(event)">
<input type="text" id="name" placeholder="Nom" required>
<input type="tel" id="phone" placeholder="Téléphone" required>

<select id="service">
<option>Montage pneus</option>
<option>Réparation</option>
<option>Équilibrage</option>
</select>

<button class="btn">Envoyer</button>
</form>
</section>

<!-- FOOTER -->
<section class="container">
<p>© 2026 IT BLUE</p>
</section>

<a class="whatsapp" href="#" onclick="openWhatsApp()">💬</a>

<script>

// Scroll smooth
function scrollToForm(){
document.getElementById("form").scrollIntoView({behavior:"smooth"});
}

// WhatsApp redirect avec message auto
function openWhatsApp(){
let phone="212600000000";
let message="Bonjour, je veux plus d'informations sur les pneus.";
window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`);
}

// Lead capture + WhatsApp funnel
function sendLead(e){
e.preventDefault();

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let service=document.getElementById("service").value;

// هنا تقدر تربط API ديالك مستقبلا
console.log({name,phone,service});

// تحويل مباشر لواتساب
let msg=`Nom: ${name} - Tel: ${phone} - Service: ${service}`;
window.open(`https://wa.me/212600000000?text=${encodeURIComponent(msg)}`);

}

// Fake analytics tracking
console.log("User visit tracked");

</script>

</body>
</html>
