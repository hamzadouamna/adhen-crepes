<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
/* --- CSS VARIABLES & RESET --- */
:root {
    --primary: #d4af37; /* Luxury Gold */
    --primary-dark: #b59020;
    --dark: #111111;
    --light: #f7f4ef;
    --white: #ffffff;
    --gray: #666666;
    --shadow: 0 10px 30px rgba(0,0,0,0.08);
    --transition: all 0.3s ease;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    scroll-behavior: smooth;
}

body {
    background: var(--light);
    color: var(--dark);
    font-family: 'Poppins', sans-serif;
    line-height: 1.7;
    overflow-x: hidden;
}

h1, h2, h3, h4 {
    font-family: 'Playfair Display', serif;
    color: var(--dark);
}

a { text-decoration: none; color: inherit; }
ul { list-style: none; }
img { max-width: 100%; display: block; }

/* --- UTILITIES --- */
.container {
    width: 90%;
    max-width: 1200px;
    margin: auto;
}

.section-padding { padding: 100px 0; }

.section-title {
    text-align: center;
    margin-bottom: 60px;
}

.section-title h2 {
    font-size: 3rem;
    margin-bottom: 15px;
}

.section-title span {
    display: block;
    width: 60px;
    height: 3px;
    background: var(--primary);
    margin: 0 auto;
}

.btn {
    display: inline-block;
    padding: 14px 35px;
    background: var(--primary);
    color: var(--white);
    font-weight: 500;
    border-radius: 50px;
    transition: var(--transition);
    border: 2px solid var(--primary);
    cursor: pointer;
    text-transform: uppercase;
    font-size: 14px;
    letter-spacing: 1px;
}

.btn:hover {
    background: transparent;
    color: var(--primary);
}

.btn-outline {
    background: transparent;
    border: 2px solid var(--white);
}

.btn-outline:hover {
    background: var(--white);
    color: var(--dark);
}

/* --- HEADER --- */
header {
    background: rgba(17, 17, 17, 0.95);
    backdrop-filter: blur(10px);
    padding: 20px 0;
    position: fixed;
    width: 100%;
    z-index: 1000;
    transition: var(--transition);
}

header .container {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-size: 26px;
    font-weight: 700;
    color: var(--primary);
    font-family: 'Playfair Display', serif;
    letter-spacing: 1px;
}

nav ul {
    display: flex;
    gap: 30px;
}

nav a {
    color: var(--white);
    font-size: 14px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
    position: relative;
}

nav a::after {
    content: '';
    position: absolute;
    width: 0;
    height: 2px;
    bottom: -5px;
    left: 0;
    background-color: var(--primary);
    transition: var(--transition);
}

nav a:hover::after { width: 100%; }

/* Mobile Menu Toggle */
.menu-toggle { display: none; color: white; font-size: 24px; cursor: pointer; }

/* --- HERO SECTION --- */
.hero {
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), url("https://images.unsplash.com/photo-1539020140153-e479b8c22e70") center/cover no-repeat fixed;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: var(--white);
    padding-top: 80px;
}

.hero-content h1 {
    font-size: 4rem;
    margin-bottom: 20px;
    color: var(--white);
    line-height: 1.2;
    animation: fadeInDown 1s ease-out;
}

.hero-content p {
    font-size: 1.2rem;
    margin-bottom: 40px;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
    opacity: 0.9;
    animation: fadeInUp 1s ease-out 0.3s backwards;
}

.hero-buttons {
    display: flex;
    gap: 20px;
    justify-content: center;
    animation: fadeInUp 1s ease-out 0.6s backwards;
}

/* --- TOURS (Cards) --- */
.tours-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 30px;
}

.card {
    background: var(--white);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: var(--transition);
    position: relative;
    opacity: 0; /* Hidden for animation */
    transform: translateY(30px);
}

.card.visible {
    opacity: 1;
    transform: translateY(0);
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.15);
}

.card-img-wrapper {
    height: 250px;
    overflow: hidden;
}

.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
}

.card:hover img { transform: scale(1.1); }

.card-content { padding: 30px; }

.card-content h3 {
    font-size: 1.5rem;
    margin-bottom: 10px;
}

.card-content p {
    color: var(--gray);
    font-size: 0.95rem;
    margin-bottom: 20px;
}

.price-tag {
    font-size: 1.25rem;
    color: var(--primary);
    font-weight: 700;
    display: block;
    margin-bottom: 20px;
}

/* --- PACKAGES --- */
.packages-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 40px;
    align-items: center;
}

.package {
    background: var(--white);
    padding: 50px 40px;
    text-align: center;
    border-radius: 12px;
    box-shadow: var(--shadow);
    transition: var(--transition);
    opacity: 0;
    transform: translateY(30px);
}

.package.visible {
    opacity: 1;
    transform: translateY(0);
}

.package:hover { transform: scale(1.02); }

.package.vip {
    background: var(--dark);
    color: var(--white);
    border: 2px solid var(--primary);
    position: relative;
}

.package.vip::before {
    content: 'BEST SELLER';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--primary);
    color: var(--white);
    padding: 5px 15px;
    font-size: 12px;
    font-weight: 600;
    border-radius: 20px;
}

.package h3 { font-size: 2rem; margin-bottom: 20px; }
.package.vip h3 { color: var(--primary); }

.package ul { margin: 30px 0; text-align: left; }
.package li { margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
.package li i { color: var(--primary); }

.package h2 { font-size: 2.5rem; color: var(--primary); margin-top: 20px; }
.package.vip h2 { color: var(--white); }

/* --- GALLERY --- */
.gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
}

.gallery-item {
    height: 250px;
    overflow: hidden;
    border-radius: 8px;
    cursor: pointer;
    opacity: 0;
    transform: scale(0.9);
    transition: all 0.5s ease;
}

.gallery-item.visible {
    opacity: 1;
    transform: scale(1);
}

.gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: var(--transition);
}

.gallery-item:hover img { transform: scale(1.1); filter: brightness(0.8); }

/* --- BOOKING FORM --- */
.form-container {
    max-width: 700px;
    margin: auto;
    background: var(--white);
    padding: 50px;
    border-radius: 12px;
    box-shadow: var(--shadow);
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.6s ease;
}

.form-container.visible {
    opacity: 1;
    transform: translateY(0);
}

.form-group { margin-bottom: 20px; }

.form-control {
    width: 100%;
    padding: 15px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-family: inherit;
    font-size: 1rem;
    transition: var(--transition);
}

.form-control:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
}

select.form-control { background: white; }

/* --- FOOTER --- */
footer {
    background: var(--dark);
    color: #888;
    padding: 60px 0 20px;
    text-align: center;
}

.footer-content { margin-bottom: 40px; }
.footer-content h2 { color: var(--white); margin-bottom: 20px; }
.footer-content p { margin-bottom: 10px; }
.footer-content a { color: var(--primary); font-weight: 600; }

.copyright {
    border-top: 1px solid #333;
    padding-top: 20px;
    font-size: 0.9rem;
}

/* --- FLOATING WHATSAPP --- */
.whatsapp-float {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: #25d366;
    color: white;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
    z-index: 1000;
    transition: var(--transition);
    animation: pulse 2s infinite;
}

.whatsapp-float:hover { transform: scale(1.1); }

@keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
    70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
    100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
}

/* --- ANIMATIONS --- */
@keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

/* --- RESPONSIVE --- */
@media (max-width: 768px) {
    .hero-content h1 { font-size: 2.5rem; }
    
    .menu-toggle { display: block; }
    
    nav {
        position: absolute;
        top: 100%;
        left: 0;
        width: 100%;
        background: var(--dark);
        padding: 20px;
        display: none;
        flex-direction: column;
        text-align: center;
    }
    
    nav.active { display: flex; }
    
    nav ul { flex-direction: column; gap: 20px; }
    
    .form-container { padding: 30px 20px; }
    
    .hero-buttons { flex-direction: column; }
    .btn { width: 100%; text-align: center; }
}
</style>
</head>
