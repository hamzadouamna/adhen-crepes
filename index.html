<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ADHEN CREPES</title>

<style>

body{
background:#111;
color:white;
font-family:sans-serif;
text-align:center;
overflow-x:hidden;
padding:20px;
}

/* LOGO */

.logo{
font-size:50px;
font-weight:bold;
margin-top:200px;
opacity:0;
animation:reveal 2s forwards;
}

@keyframes reveal{
0%{
letter-spacing:40px;
opacity:0;
}
100%{
letter-spacing:5px;
opacity:1;
}
}

/* move up */

.logo.move{
animation:moveUp 1s forwards;
}

@keyframes moveUp{
0%{
transform:translateY(0);
}
100%{
transform:translateY(-120px);
}
}

/* MENU */

.menu{
opacity:0;
transform:translateY(50px);
transition:1s;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:20px;
margin-top:40px;
}

.menu.show{
opacity:1;
transform:translateY(0);
}

.card{
background:#222;
padding:15px;
border-radius:20px;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 15px orange;
}

.card img{
width:100%;
border-radius:10px;
}

.price{
margin-top:10px;
background:orange;
display:inline-block;
padding:5px 12px;
border-radius:20px;
}

/* CART BUTTON */

.cart-btn{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#ff7a00;
padding:14px 25px;
border-radius:30px;
cursor:pointer;
}

.counter{
position:absolute;
top:-6px;
right:-6px;
background:red;
color:white;
font-size:12px;
padding:3px 7px;
border-radius:50%;
}

/* CART */

.cart{
position:fixed;
bottom:-100%;
left:0;
width:100%;
background:#111;
border-radius:25px 25px 0 0;
padding:20px;
transition:.4s;
}

.cart.open{
bottom:0;
}

.cart-item{
display:flex;
justify-content:space-between;
margin-top:10px;
}

.total{
margin-top:15px;
color:orange;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
}

button.send{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#25D366;
color:white;
margin-top:12px;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<h1 class="logo" id="logo">
ADHEN CREPES
</h1>

<div class="menu" id="menu"></div>

<div class="cart-btn" onclick="toggleCart()">
🛒 الطلب
<span class="counter" id="counter">0</span>
</div>

<div class="cart" id="cart">

<h3>الطلب</h3>

<div id="items"></div>

<div class="total" id="total"></div>

<input id="name" placeholder="اسمك">

<button class="send" onclick="send()">إرسال الطلب عبر WhatsApp</button>

</div>

<script>

/* LOGO ANIMATION */

setTimeout(()=>{
document.getElementById("logo").classList.add("move");
},2000)

setTimeout(()=>{
document.getElementById("menu").classList.add("show");
},3000)

/* MENU DATA */

let foods=[

{name:"كريب لوتس",price:18,img:"https://images.unsplash.com/photo-1519671482749-fd09be7ccebf"},

{name:"كريب نوتيلا",price:15,img:"https://images.unsplash.com/photo-1587731556938-38755b4803a6"},

{name:"عصير فراولة",price:15,img:"https://images.unsplash.com/photo-1553530666-ba11a7da3888"}

]

let order={}
let total=0
let count=0

renderMenu()

function renderMenu(){

let html=""

foods.forEach(f=>{

html+=`

<div class="card" onclick="add('${f.name}',${f.price})">

<img src="${f.img}">

<h3>${f.name}</h3>

<div class="price">${f.price}dh</div>

</div>

`

})

menu.innerHTML=html

}

function add(name,price){

if(!order[name]) order[name]={qty:0,price:price}

order[name].qty++

count++

total+=price

update()

cart.classList.add("open")

}

function update(){

counter.innerText=count

let html=""

for(let i in order){

let line=order[i].qty*order[i].price

html+=`

<div class="cart-item">

<span>${order[i].qty} × ${i} = ${line}dh</span>

</div>

`

}

items.innerHTML=html

document.getElementById("total").innerText="المجموع: "+total+"dh"

}

function toggleCart(){

if(count===0) return

cart.classList.toggle("open")

}

function send(){

let name=document.getElementById("name").value

let msg="طلب جديد%0A%0Aالاسم: "+name+"%0A%0A"

for(let i in order){

msg+=i+" × "+order[i].qty+"%0A"

}

msg+="%0Aالمجموع: "+total+"dh"

window.open("https://wa.me/212774475007?text="+msg)

}

</script>

</body>

</html>
