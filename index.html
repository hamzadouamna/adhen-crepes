<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>88 CONNECT - Luxury Adventures Marrakech</title>
    
    <meta name="description" content="Premium Quad tours, Desert dinners, and Hot Air Balloon rides in Marrakech.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #050505;
            --accent: #ff9f1c;
            --accent-glow: rgba(255, 159, 28, 0.3);
            --glass: rgba(255, 255, 255, 0.03);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--primary);
            color: #fff;
            overflow-x: hidden;
        }

        /* --- Optimized Header --- */
        .header {
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 15px 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .nav-link {
            color: #ccc !important;
            margin: 0 15px;
            font-weight: 500;
            transition: var(--transition);
        }

        .nav-link:hover { color: var(--accent) !important; }

        /* --- Hero Section --- */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://88-connect.com/wp-content/themes/88connect/public/bgs/bg-5.webp') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        /* --- Grid & Cards --- */
        .activity-card {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            aspect-ratio: 4/5;
            transition: var(--transition);
        }

        .activity-card img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.6s ease;
        }

        .activity-card:hover img { transform: scale(1.1); }

        .activity-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            display: flex;
            align-items: flex-end;
            padding: 30px;
        }

        /* --- Forms --- */
        .booking-box {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 24px;
        }

        .form-control, .form-select {
            background: rgba(255,255,255,0.05) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            color: #fff !important;
            padding: 12px 15px;
            margin-bottom: 15px;
        }

        .btn-accent {
            background: var(--accent);
            color: #000;
            font-weight: 700;
            padding: 15px 30px;
            border-radius: 50px;
            border: none;
            width: 100%;
            transition: var(--transition);
        }

        .btn-accent:hover {
            background: #fff;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px var(--accent-glow);
        }

        @media (max-width: 768px) {
            .header .container { flex-direction: row; justify-content: space-between; }
            nav { display: none; } /* Simplified for example, usually a hamburger here */
        }
    </style>
</head>
<body>

<header class="header">
    <div class="container d-flex justify-content-between align-items-center">
        <img src="https://88-connect.com/wp-content/themes/88connect/public/logo.jpg" alt="88 Connect" height="40" style="filter: invert(1)">
        <nav class="d-none d-md-block">
            <a href="#activities" class="nav-link d-inline">Activities</a>
            <a href="#pricing" class="nav-link d-inline">Pricing</a>
        </nav>
        <a href="https://wa.me/212663250329" class="btn btn-sm btn-outline-light rounded-pill px-4">WhatsApp</a>
    </div>
</header>

<section class="hero">
    <div class="container">
        <h1>Unleash the <span style="color: var(--accent)">Adventure</span></h1>
        <p class="lead mb-4">The ultimate Marrakech experience awaits.</p>
        <a href="#booking" class="btn-accent" style="width: auto; display: inline-block;">Book Now</a>
    </div>
</section>

<section id="activities" class="container py-5">
    <h2 class="text-center mb-5 fw-bold">Popular Experiences</h2>
    <div class="row g-4">
        <div class="col-md-4">
            <div class="activity-card">
                <img src="https://88-connect.com/wp-content/themes/88connect/public/imgs/img-about-1.png" alt="Quads" loading="lazy">
                <div class="activity-overlay"><h3>Quad Tours</h3></div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="activity-card">
                <img src="https://88-connect.com/wp-content/themes/88connect/public/bgs/bg-5.webp" alt="Dinner" loading="lazy">
                <div class="activity-overlay"><h3>Desert Dinner</h3></div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="activity-card">
                <img src="https://88-connect.com/wp-content/themes/88connect/public/imgs/img-2.jpg" alt="Balloon" loading="lazy">
                <div class="activity-overlay"><h3>Hot Air Balloon</h3></div>
            </div>
        </div>
    </div>
</section>

<section id="booking" class="container py-5">
    <div class="booking-box mx-auto" style="max-width: 600px;">
        <h2 class="text-center mb-4">Secure Your Spot</h2>
        <form id="bookingForm">
            <input id="name" type="text" class="form-control" placeholder="Full Name" required>
            <input id="phone" type="tel" class="form-control" placeholder="Phone Number" required>
            
            <div class="row">
                <div class="col-6">
                    <select id="activity" class="form-select" required onchange="calculatePreview()">
                        <option value="">Activity</option>
                        <option value="Quad Tour">Quad Tour</option>
                        <option value="Desert Dinner">Desert Dinner</option>
                        <option value="Hot Air Balloon">Hot Air Balloon</option>
                    </select>
                </div>
                <div class="col-6">
                    <input id="persons" type="number" class="form-control" min="1" max="20" placeholder="Pax" required onchange="calculatePreview()">
                </div>
            </div>

            <input id="date" type="date" class="form-control" required>
            <textarea id="message" class="form-control" placeholder="Special requirements..."></textarea>
            
            <div id="pricePreview" class="text-center mb-3 text-accent fw-bold" style="color: var(--accent)"></div>

            <button type="submit" class="btn-accent">Send WhatsApp Booking</button>
        </form>
    </div>
</section>

<script>
    // Set minimum date to today
    document.getElementById('date').min = new Date().toISOString().split("T")[0];

    const prices = {
        "Quad Tour": 350,
        "Desert Dinner": 500,
        "Hot Air Balloon": 1500
    };

    function calculatePreview() {
        const act = document.getElementById("activity").value;
        const pax = document.getElementById("persons").value;
        const preview = document.getElementById("pricePreview");
        
        if(act && pax) {
            preview.innerText = `Estimated Total: ${prices[act] * pax} MAD`;
        } else {
            preview.innerText = "";
        }
    }

    document.getElementById('bookingForm').onsubmit = function(e) {
        e.preventDefault();
        
        const name = document.getElementById("name").value;
        const phone = document.getElementById("phone").value;
        const activity = document.getElementById("activity").value;
        const persons = document.getElementById("persons").value;
        const date = document.getElementById("date").value;
        const msg = document.getElementById("message").value;

        const total = (prices[activity] || 0) * persons;

        const text = `*NEW BOOKING - 88 CONNECT*%0A` +
                     `--------------------------%0A` +
                     `*Name:* ${encodeURIComponent(name)}%0A` +
                     `*Phone:* ${encodeURIComponent(phone)}%0A` +
                     `*Activity:* ${activity}%0A` +
                     `*Persons:* ${persons}%0A` +
                     `*Date:* ${date}%0A` +
                     `*Total:* ${total} MAD%0A` +
                     `*Message:* ${encodeURIComponent(msg)}`;

        window.open(`https://wa.me/212663250329?text=${text}`, '_blank');
    };
</script>

</body>
</html>
