<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADHEN CREPES</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:linear-gradient(135deg,#1a1a1a,#2d2d2d);
color:white;
padding:20px;
}

.logo{
text-align:center;
font-size:34px;
margin-bottom:25px;

text-shadow:
0 0 10px #ff8a00,
0 0 20px #ff8a00,
0 0 40px #ff4500;
}

.filters{
display:flex;
gap:10px;
margin-bottom:20px;
overflow-x:auto;
}

.filter{
padding:10px 18px;
background:rgba(255,255,255,0.1);
border-radius:30px;
cursor:pointer;
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:18px;
}

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border-radius:20px;
padding:12px;
text-align:center;
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px orange;
}

.card img{
width:100%;
border-radius:14px;
margin-bottom:8px;
}

.price{
color:#ffb347;
}

.cart-btn{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#ff7a00;
padding:14px 25px;
border-radius:30px;
cursor:pointer;
box-shadow:0 0 20px #ff7a00;
}

.counter{
position:absolute;
top:-6px;
right:-6px;
background:red;
color:white;
font-size:12px;
padding:3px 7px;
border-radius:50%;
}

.cart{
position:fixed;
bottom:-100%;
left:0;
width:100%;
background:#111;
border-radius:25px 25px 0 0;
padding:20px;
transition:0.4s;
}

.cart.open{
bottom:0;
}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:10px;
}

.controls button{
padding:4px 8px;
margin:2px;
border:none;
border-radius:6px;
cursor:pointer;
}

.total{
margin-top:12px;
color:#ffb347;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
}

button.send{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#25D366;
color:white;
margin-top:12px;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="logo">ADHEN CREPES</div>

<div class="filters">
<div class="filter" onclick="filter('all')">الكل</div>
<div class="filter" onclick="filter('crepe')">كريب</div>
<div class="filter" onclick="filter('jus')">عصائر</div>
</div>

<div class="menu" id="menu"></div>

<div class="cart-btn" onclick="toggleCart()">
🛒 الطلب
<span class="counter" id="counter">0</span>
</div>

<div class="cart" id="cart">

<h3>الطلب</h3>

<div id="items"></div>

<div class="total" id="total"></div>

<input id="name" placeholder="اسمك">

<button class="send" onclick="send()">إرسال الطلب عبر WhatsApp</button>

</div>

<script>

/* صوت الكليك */

let clickSound = new Audio("click.mp3")
clickSound.preload="auto"

let foods=[

{name:"كريب نوتيلا",price:15,cat:"crepe",img:"https://images.unsplash.com/photo-1519671482749-fd09be7ccebf"},
{name:"كريب لوتس",price:18,cat:"crepe",img:"https://images.unsplash.com/photo-1587731556938-38755b4803a6"},
{name:"عصير فراولة",price:15,cat:"jus",img:"https://images.unsplash.com/photo-1553530666-ba11a7da3888"}

]

let order={}
let total=0
let count=0

renderMenu()

function renderMenu(){

let html=""

foods.forEach(f=>{

html+=`

<div class="card" data-cat="${f.cat}" onclick="add('${f.name}',${f.price})">

<img src="${f.img}">
<h3>${f.name}</h3>
<div class="price">${f.price}dh</div>

</div>

`

})

document.getElementById("menu").innerHTML=html

}

function filter(cat){

let cards=document.querySelectorAll(".card")

cards.forEach(c=>{

if(cat=="all" || c.dataset.cat==cat){
c.style.display="block"
}else{
c.style.display="none"
}

})

}

function add(name,price){

if(!order[name]) order[name]={qty:0,price:price}

order[name].qty++
count++
total+=price

clickSound.currentTime=0
clickSound.play()

update()

document.getElementById("cart").classList.add("open")

}

function plus(name){

order[name].qty++
count++
total+=order[name].price

update()

}

function minus(name){

order[name].qty--
count--
total-=order[name].price

if(order[name].qty<=0){
delete order[name]
}

update()

}

function removeItem(name){

count-=order[name].qty
total-=order[name].qty*order[name].price

delete order[name]

update()

}

function update(){

document.getElementById("counter").innerText=count

let html=""

for(let i in order){

let lineTotal=order[i].qty*order[i].price

html+=`

<div class="cart-item">

<span>${lineTotal}dh = ${order[i].qty} × ${i}</span>

<div class="controls">

<button onclick="minus('${i}')">-</button>
<span>${order[i].qty}</span>
<button onclick="plus('${i}')">+</button>
<button onclick="removeItem('${i}')">❌</button>

</div>

</div>

`

}

document.getElementById("items").innerHTML=html
document.getElementById("total").innerText="المجموع: "+total+"dh"

if(Object.keys(order).length===0){
document.getElementById("cart").classList.remove("open")
}

}

function toggleCart(){

let cart=document.getElementById("cart")

if(Object.keys(order).length===0){
return
}

cart.classList.toggle("open")

}

function send(){

let name=document.getElementById("name").value

let msg="طلب جديد%0A%0Aالاسم: "+name+"%0A%0A"

for(let i in order){
msg+=i+" ×"+order[i].qty+"%0A"
}

msg+="%0Aالمجموع: "+total+"dh"

window.open("https://wa.me/212774475007?text="+msg)

}

/* اغلاق السلة عند الضغط خارجها */

document.addEventListener("click",function(e){

let cart=document.getElementById("cart")
let cartBtn=document.querySelector(".cart-btn")

if(
cart.classList.contains("open") &&
!cart.contains(e.target) &&
!cartBtn.contains(e.target)
){
cart.classList.remove("open")
}

})

</script>

</body>
</html>
