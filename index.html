<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ADHEN CREPES | Premium Taste</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;800&display=swap" rel="stylesheet" />

<style>

:root{
--primary:#ff9f1c;
--secondary:#2ec4b6;
--dark-bg:#0f1014;
--card-bg:#1c1e26;
--text-color:#ffffff;
--glass:rgba(255,255,255,0.05);
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
background-color:var(--dark-bg);
background-image:radial-gradient(circle at top right,#2a2a2a 0%,#0f1014 60%);
color:var(--text-color);
font-family:'Tajawal',sans-serif;
text-align:center;
overflow-x:hidden;
padding-bottom:100px;
}

header{
padding:40px 20px;
position:relative;
z-index:10;
}

.logo{
font-size:3rem;
font-weight:800;
letter-spacing:2px;
color:var(--primary);
text-transform:uppercase;
margin-bottom:10px;
opacity:0;
transform:translateY(30px);
animation:fadeUp 1s forwards .5s;
}

.tagline{
font-size:1.1rem;
color:#aaa;
opacity:0;
animation:fadeUp 1s forwards .8s;
}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}

.container{
max-width:1200px;
margin:0 auto;
padding:0 20px;
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
margin-top:40px;
opacity:0;
transform:translateY(50px);
transition:all 1s ease;
}

.menu.show{
opacity:1;
transform:translateY(0);
}

.card{
background:var(--card-bg);
border-radius:20px;
overflow:hidden;
border:1px solid rgba(255,255,255,0.05);
transition:transform .3s ease,box-shadow .3s ease;
cursor:pointer;
display:flex;
flex-direction:column;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 10px 30px rgba(255,159,28,.15);
border-color:var(--primary);
}

.card-img-wrapper{
height:200px;
overflow:hidden;
border-bottom:1px solid rgba(255,255,255,.05);
}

.card img{
width:100%;
height:100%;
object-fit:cover;
transition:transform .5s ease;
}

.card:hover img{
transform:scale(1.1);
}

.card-content{
padding:20px;
text-align:right;
flex-grow:1;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.card h3{
font-size:1.4rem;
margin-bottom:10px;
}

.price-tag{
background:rgba(255,159,28,.1);
color:var(--primary);
padding:6px 15px;
border-radius:50px;
font-weight:bold;
display:inline-block;
}

.cart-float{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:linear-gradient(45deg,var(--primary),#ff7a00);
padding:15px 40px;
border-radius:50px;
cursor:pointer;
box-shadow:0 10px 20px rgba(255,122,0,.3);
z-index:100;
display:flex;
align-items:center;
gap:10px;
font-weight:700;
font-size:1.2rem;
}

.counter-badge{
background:white;
color:var(--primary);
width:24px;
height:24px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:14px;
}

.cart-sidebar{
position:fixed;
top:0;
left:-100%;
width:100%;
max-width:400px;
height:100vh;
background:#16181f;
z-index:200;
padding:30px;
transition:.4s;
box-shadow:10px 0 30px rgba(0,0,0,.5);
display:flex;
flex-direction:column;
}

.cart-sidebar.open{
left:0;
}

.cart-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
border-bottom:1px solid rgba(255,255,255,.1);
padding-bottom:15px;
}

.close-cart{
background:none;
border:none;
color:#fff;
font-size:24px;
cursor:pointer;
}

.cart-items{
flex-grow:1;
overflow-y:auto;
margin-bottom:20px;
}

.cart-item{
display:flex;
justify-content:space-between;
background:rgba(255,255,255,.03);
padding:15px;
border-radius:12px;
margin-bottom:10px;
}

.cart-total{
font-size:1.5rem;
color:var(--primary);
font-weight:bold;
margin-bottom:20px;
text-align:left;
}

input{
width:100%;
padding:15px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.1);
border-radius:12px;
color:white;
font-family:'Tajawal',sans-serif;
outline:none;
}

.btn-whatsapp{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#25d366;
color:white;
margin-top:15px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
opacity:0;
pointer-events:none;
transition:.3s;
}

.overlay.active{
opacity:1;
pointer-events:all;
}

</style>
</head>

<body>

<header>
<h1 class="logo">ADHEN CREPES</h1>
<p class="tagline">أفضل كريب في المدينة</p>
</header>

<div class="container">
<div class="menu" id="menu"></div>
</div>

<button class="cart-float" id="cartBtn" onclick="toggleCart()">
🛒 سلة الطلبات
<span class="counter-badge" id="counter">0</span>
</button>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<aside class="cart-sidebar" id="cart">
<div class="cart-header">
<h2>طلبك الحالي</h2>
<button class="close-cart" id="closeCart">✕</button>
</div>

<div class="cart-items" id="items"></div>

<div class="cart-total">
المجموع: <span id="total">0</span> درهم
</div>

<input type="text" id="name" placeholder="أدخل اسمك هنا..." />

<button class="btn-whatsapp" onclick="send()">إرسال الطلب عبر واتساب</button>

</aside>

<script>

const foods=[
{name:"كريب لوتس",price:18,img:"https://images.unsplash.com/photo-1519671482749-fd09be7ccebf?auto=format&fit=crop&w=400&q=80"},
{name:"كريب نوتيلا",price:15,img:"https://images.unsplash.com/photo-1587731556938-38755b4803a6?auto=format&fit=crop&w=400&q=80"},
{name:"عصير فراولة",price:15,img:"https://images.unsplash.com/photo-1553530666-ba11a7da3888?auto=format&fit=crop&w=400&q=80"}
];

let order={}
let total=0

const menuElement=document.getElementById("menu")
const counterElement=document.getElementById("counter")
const cartElement=document.getElementById("cart")
const overlayElement=document.getElementById("overlay")
const itemsElement=document.getElementById("items")
const totalElement=document.getElementById("total")
const nameInput=document.getElementById("name")

function renderMenu(){

let html=""

foods.forEach((food,index)=>{

html+=`
<article class="card" onclick="add('${food.name}',${food.price})">
<div class="card-img-wrapper">
<img src="${food.img}" loading="lazy">
</div>
<div class="card-content">
<h3>${food.name}</h3>
<span class="price-tag">${food.price} درهم</span>
</div>
</article>
`

})

menuElement.innerHTML=html

}

function add(name,price){

if(order[name]) order[name]++
else order[name]=1

updateCart()

}

function remove(name){

order[name]--

if(order[name]==0) delete order[name]

updateCart()

}

function updateCart(){

itemsElement.innerHTML=""
total=0
let count=0

for(const[name,qty]of Object.entries(order)){

const food=foods.find(f=>f.name===name)

total+=food.price*qty
count+=qty

itemsElement.innerHTML+=`
<div class="cart-item">
<span>${qty} × ${name}</span>
<span>${qty*food.price} درهم</span>
</div>
`

}

counterElement.textContent=count
totalElement.textContent=total

}

function toggleCart(){

cartElement.classList.toggle("open")
overlayElement.classList.toggle("active")

}

function send(){

const name=nameInput.value.trim()

if(!name){
alert("الرجاء إدخال اسمك")
return
}

let message=`مرحبا، اسمي ${name} وأرغب في طلب:\n\n`

for(const[name,qty]of Object.entries(order)){

const food=foods.find(f=>f.name===name)

message+=`- ${qty} × ${name} = ${qty*food.price} درهم\n`

}

message+=`\nالمجموع: ${total} درهم`

const encoded=encodeURIComponent(message)

const phoneNumber='212774475007'

const url=`https://wa.me/${phoneNumber}?text=${encoded}`

window.open(url,'_blank')

}

window.onload=()=>{
renderMenu()
setTimeout(()=>menuElement.classList.add("show"),300)
}

</script>

</body>
</html>
