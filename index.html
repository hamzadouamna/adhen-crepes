<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tire Finder Maroc | Pneus Compatibles</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#0f172a;
color:white;
}

.container{
width:90%;
max-width:1000px;
margin:auto;
padding:40px 0;
}

h1{text-align:center;font-size:40px;}

.search-box{
width:100%;
padding:15px;
border-radius:10px;
border:none;
margin-top:20px;
font-size:16px;
}

.card{
background:#1e293b;
padding:20px;
margin-top:15px;
border-radius:12px;
transition:0.3s;
}

.card:hover{transform:scale(1.02);}

.brand{
color:#38bdf8;
font-weight:bold;
margin-top:25px;
}

.size{
color:#facc15;
margin-left:10px;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
font-size:22px;
text-decoration:none;
color:white;
}

button{
background:#3b82f6;
border:none;
padding:10px 15px;
color:white;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>🔎 Tire Finder Maroc</h1>
<p style="text-align:center;">Choisis ta voiture et découvre les pneus compatibles</p>

<input class="search-box" id="search" placeholder="Ex: Clio, Golf, Corolla..." onkeyup="searchCar()">

<div id="results"></div>

</div>

<a class="whatsapp" href="#" onclick="openWhatsApp()">💬</a>

<script>

// 📊 DATABASE (cars + sizes)
const data = [

{brand:"Renault Clio 4 / 5", sizes:["185/65 R15","195/55 R16"]},
{brand:"Renault Megane 3 / 4", sizes:["195/65 R15","205/55 R16","225/45 R17"]},
{brand:"Renault Dacia Logan", sizes:["165/80 R14","185/65 R15"]},
{brand:"Dacia Duster", sizes:["215/65 R16","215/60 R17","225/60 R17"]},

{brand:"VW Golf 6 / 7 / 8", sizes:["195/65 R15","205/55 R16","225/45 R17","225/40 R18"]},
{brand:"VW Polo", sizes:["175/70 R14","185/65 R15","195/55 R16"]},
{brand:"VW Passat", sizes:["215/60 R16","215/55 R17","235/45 R18"]},

{brand:"Peugeot 208", sizes:["185/65 R15","195/55 R16"]},
{brand:"Peugeot 308", sizes:["195/65 R15","205/55 R16","225/45 R17"]},
{brand:"Peugeot 508", sizes:["215/60 R16","215/55 R17","235/45 R18"]},

{brand:"Toyota Corolla", sizes:["195/65 R15","205/55 R16","225/45 R17"]},
{brand:"Toyota Yaris", sizes:["175/65 R15","185/60 R15","195/50 R16"]},
{brand:"Toyota Prado", sizes:["265/65 R17","265/60 R18","275/55 R19"]},

{brand:"Hyundai i20", sizes:["185/65 R15","195/55 R16"]},
{brand:"Hyundai Tucson", sizes:["225/60 R17","225/55 R18","235/55 R19"]},
{brand:"Kia Sportage", sizes:["215/70 R16","225/60 R17","235/55 R18"]}

];

// 🔎 search function
function searchCar(){

let input = document.getElementById("search").value.toLowerCase();
let results = document.getElementById("results");

results.innerHTML="";

data.forEach(car=>{

if(car.brand.toLowerCase().includes(input)){

results.innerHTML += `
<div class="card">
<div class="brand">${car.brand}</div>
<div>🛞 Sizes:</div>
${car.sizes.map(s=>`<span class="size">${s}</span>`).join(" ")}
<br>
<button onclick="order('${car.brand}')">Commander</button>
</div>
`;

}

});

}

// 💬 WhatsApp order
function order(car){
let phone="212622251754";
let msg="Bonjour, je veux des pneus pour: "+car;
window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
}

// floating WhatsApp
function openWhatsApp(){
let phone="212622251754";
let msg="Bonjour, je cherche des pneus.";
window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
}

// load all at start
searchCar();

</script>

</body>
</html>
