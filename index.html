<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khatra | Ultra Premium Coffee</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #c68b59; 
            --dark: #0a0a0a; 
            --ease: cubic-bezier(0.23, 1, 0.32, 1);
        }
        
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Montserrat', sans-serif; scroll-behavior: smooth; }
        body { background: var(--dark); color: #fff; overflow-x: hidden; cursor: default; }

        /* Smooth Reveal Animation */
        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s var(--ease); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* Cinematic Hero */
        .hero {
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1541167760496-1628856ab772?q=80&w=2070');
            background-size: cover; background-position: center; perspective: 1000px;
        }

        .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(3rem, 10vw, 7rem); color: var(--gold); margin-bottom: 10px; }
        .hero p { font-size: 1.1rem; letter-spacing: 0.5rem; text-transform: uppercase; margin-bottom: 40px; }

        .btn {
            padding: 16px 40px; background: rgba(255,255,255,0.05); border: 1px solid var(--gold); color: #fff;
            text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: all 0.6s var(--ease);
            font-size: 0.8rem; border-radius: 50px; backdrop-filter: blur(10px);
        }
        .btn:hover { background: var(--gold); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(198,139,89,0.3); }

        /* Premium Cards */
        .section { padding: 150px 10%; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        
        .card {
            background: rgba(255, 255, 255, 0.02); padding: 50px; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; transition: all 0.6s var(--ease); cursor: pointer; position: relative; overflow: hidden;
        }
        .card:hover { transform: translateY(-10px); border-color: var(--gold); background: rgba(198, 139, 89, 0.05); }
        .card h3 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 1.5rem; margin-bottom: 10px; }

        /* Floating Cart */
        .cart-box { 
            position: fixed; bottom: 40px; right: 40px; background: rgba(20, 20, 20, 0.8); 
            padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(20px); transition: all 0.4s var(--ease);
        }
        .bounce { animation: pulse 0.6s var(--ease); }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        @media (max-width: 768px) { .cart-box { right: 20px; left: 20px; } }
    </style>
</head>
<body>

<section class="hero reveal active">
    <h1>Khatra</h1>
    <p>Ultra Premium Coffee</p>
    <button class="btn" onclick="document.getElementById('menu').scrollIntoView({behavior:'smooth'})">Explore Selection</button>
</section>

<section class="section" id="menu">
    <div class="menu-grid">
        <div class="card reveal" onclick="add('Espresso Elite')">
            <h3>Espresso Elite</h3>
            <p>Intense, bold, and pure.</p>
            <h4 style="margin-top:20px; color:var(--gold);">15 MAD</h4>
        </div>
        <div class="card reveal" onclick="add('Cappuccino')">
            <h3>Cappuccino</h3>
            <p>Velvety foam, rich espresso.</p>
            <h4 style="margin-top:20px; color:var(--gold);">22 MAD</h4>
        </div>
        <div class="card reveal" onclick="add('Signature Latte')">
            <h3>Signature Latte</h3>
            <p>Creamy perfection in a cup.</p>
            <h4 style="margin-top:20px; color:var(--gold);">25 MAD</h4>
        </div>
    </div>
</section>

<div class="cart-box" id="cart-ui">
    <h3 style="font-size: 0.9rem; margin-bottom: 10px;">YOUR ORDER</h3>
    <div id="cart-list" style="font-size: 0.8rem; opacity: 0.7;">Empty</div>
</div>

<script>
    // Intersection Observer for Scroll Reveals
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => { if(entry.isIntersecting) entry.target.classList.add('active'); });
    }, { threshold: 0.1 });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

    let cart = [];
    function add(item) { 
        cart.push(item); 
        const cartUI = document.getElementById("cart-ui");
        document.getElementById("cart-list").innerHTML = cart.map(c => `<div>• ${c}</div>`).join("");
        
        cartUI.classList.add('bounce');
        setTimeout(() => cartUI.classList.remove('bounce'), 600);
    }
</script>

</body>
</html>
