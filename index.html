<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ADHEN CREPES | Premium Taste</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet" />

<style>
:root {
    --primary: #ff9f1c;
    --primary-glow: rgba(255, 159, 28, 0.4);
    --secondary: #2ec4b6;
    --dark-bg: #0f1014;
    --card-bg: rgba(28, 30, 38, 0.7);
    --text-color: #ffffff;
    --text-muted: #a0a0a0;
    --glass-border: rgba(255, 255, 255, 0.08);
    --glass-highlight: rgba(255, 255, 255, 0.03);
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
}

body {
    background-color: var(--dark-bg);
    /* Subtle noise texture for premium feel */
    background-image: 
        radial-gradient(circle at 10% 20%, rgba(46, 196, 182, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(255, 159, 28, 0.05) 0%, transparent 40%),
        linear-gradient(180deg, #0f1014 0%, #16181f 100%);
    color: var(--text-color);
    font-family: 'Tajawal', sans-serif;
    text-align: center;
    overflow-x: hidden;
    padding-bottom: 120px;
}

/* --- Header --- */
header {
    padding: 60px 20px 40px;
    position: relative;
}

.logo {
    font-size: 3.5rem;
    font-weight: 900;
    color: var(--primary);
    text-shadow: 0 0 20px var(--primary-glow);
    margin-bottom: 10px;
    opacity: 0;
    transform: translateY(30px);
    animation: fadeUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards 0.2s;
}

.tagline {
    font-size: 1.2rem;
    color: var(--text-muted);
    font-weight: 300;
    opacity: 0;
    animation: fadeUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards 0.5s;
}

/* --- Menu Grid --- */
.container {
    max-width: 1200px;
    margin: auto;
    padding: 0 20px;
}

.menu {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 30px;
    margin-top: 40px;
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.8s ease;
}

.menu.show {
    opacity: 1;
    transform: translateY(0);
}

/* --- Cards --- */
.card {
    background: var(--card-bg);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    position: relative;
    backdrop-filter: blur(10px);
}

.card:hover {
    transform: translateY(-8px);
    box-shadow: 0 15px 30px rgba(0,0,0,0.4);
    border-color: rgba(255, 159, 28, 0.3);
}

.card-img-wrapper {
    height: 220px;
    overflow: hidden;
    position: relative;
}

.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
}

.card:hover img {
    transform: scale(1.05);
}

.card-content {
    padding: 25px;
    text-align: right;
    position: relative;
    z-index: 2;
}

.card h3 {
    font-size: 1.4rem;
    margin-bottom: 10px;
    font-weight: 700;
}

.price-tag {
    background: linear-gradient(135deg, rgba(255,159,28,0.15), rgba(255,159,28,0.05));
    color: var(--primary);
    padding: 8px 16px;
    border-radius: 50px;
    font-weight: 700;
    display: inline-block;
    border: 1px solid rgba(255, 159, 28, 0.2);
    font-size: 1.1rem;
}

/* --- Floating Cart Button --- */
.cart-float {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: linear-gradient(135deg, #ff9f1c, #ff7a00);
    padding: 16px 40px;
    border-radius: 50px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 800;
    font-size: 1.1rem;
    box-shadow: 0 10px 25px rgba(255, 122, 0, 0.4);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 100;
    opacity: 0;
}

.cart-float.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
}

.cart-float:hover {
    transform: translateX(-50%) translateY(-5px);
    box-shadow: 0 15px 35px rgba(255, 122, 0, 0.5);
}

.counter-badge {
    background: white;
    color: #ff7a00;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 900;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

/* --- Overlay & Sidebar --- */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(5px);
    opacity: 0;
    pointer-events: none;
    transition: 0.3s ease;
    z-index: 99;
}

.overlay.active {
    opacity: 1;
    pointer-events: auto;
}

.cart-sidebar {
    position: fixed;
    top: 0;
    left: -100%; /* RTL: Left is start */
    width: 100%;
    max-width: 450px;
    height: 100vh;
    background: #16181f;
    padding: 30px;
    transition: 0.4s cubic-bezier(0.77, 0, 0.175, 1);
    display: flex;
    flex-direction: column;
    z-index: 100;
    box-shadow: -10px 0 30px rgba(0,0,0,0.5);
    border-right: 1px solid var(--glass-border);
}

.cart-sidebar.open {
    left: 0;
}

.cart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--glass-border);
}

.cart-header h2 {
    font-size: 1.8rem;
    color: var(--primary);
}

.close-cart {
    background: rgba(255,255,255,0.05);
    border: none;
    color: white;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
    transition: 0.2s;
}

.close-cart:hover {
    background: rgba(255,255,255,0.1);
}

.cart-items {
    flex: 1;
    overflow-y: auto;
    margin-bottom: 20px;
    padding-right: 5px; /* Space for scrollbar */
}

/* Custom Scrollbar */
.cart-items::-webkit-scrollbar {
    width: 6px;
}
.cart-items::-webkit-scrollbar-thumb {
    background: #333;
    border-radius: 3px;
}

.cart-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255, 255, 255, 0.03);
    padding: 15px;
    border-radius: 16px;
    margin-bottom: 12px;
    border: 1px solid transparent;
    transition: 0.2s;
}

.cart-item:hover {
    background: rgba(255, 255, 255, 0.06);
    border-color: var(--glass-border);
}

.qty-controls {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(0,0,0,0.3);
    padding: 4px;
    border-radius: 12px;
}

.qty-btn {
    background: linear-gradient(135deg, #ff9f1c, #ff7a00);
    border: none;
    color: white;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.2s;
}

.qty-btn:active {
    transform: scale(0.9);
}

.cart-item-info {
    flex: 1;
    padding: 0 15px;
    text-align: right;
}

.cart-item-name {
    font-weight: 700;
    font-size: 1.1rem;
    display: block;
}

.cart-item-price {
    font-size: 0.9rem;
    color: var(--text-muted);
}

.cart-total {
    font-size: 1.5rem;
    color: var(--primary);
    margin-bottom: 20px;
    font-weight: 800;
    text-align: right;
    border-top: 1px solid var(--glass-border);
    padding-top: 20px;
}

input {
    width: 100%;
    padding: 16px;
    border-radius: 16px;
    border: 1px solid var(--glass-border);
    background: rgba(0,0,0,0.2);
    color: white;
    font-family: 'Tajawal', sans-serif;
    font-size: 1rem;
    margin-bottom: 15px;
    transition: 0.3s;
}

input:focus {
    outline: none;
    border-color: var(--primary);
    background: rgba(0,0,0,0.4);
}

.btn-whatsapp {
    width: 100%;
    padding: 18px;
    border: none;
    border-radius: 16px;
    background: #25d366;
    color: white;
    font-weight: 800;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: 0.3s;
    box-shadow: 0 5px 15px rgba(37, 211, 102, 0.2);
}

.btn-whatsapp:hover {
    background: #20bd5a;
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(37, 211, 102, 0.3);
}

/* Animations */
@keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
}

/* Mobile Adjustments */
@media (max-width: 600px) {
    .logo { font-size: 2.5rem; }
    .cart-sidebar { max-width: 100%; }
}
</style>
</head>

<body>

<header>
    <h1 class="logo">ADHEN CREPES</h1>
    <p class="tagline">أفضل كريب في المدينة، طعم لا يُقاوم</p>
</header>

<div class="container">
    <div class="menu" id="menu"></div>
</div>

<button class="cart-float" id="cartBtn" onclick="toggleCart()">
    🛒 الطلب
    <span class="counter-badge" id="counter">0</span>
</button>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<aside class="cart-sidebar" id="cart">
    <div class="cart-header">
        <h2>طلبك الحالي</h2>
        <button class="close-cart" onclick="toggleCart()">✕</button>
    </div>

    <div class="cart-items" id="items">
        <!-- Items injected here -->
    </div>

    <div class="cart-total">
        المجموع: <span id="total">0</span> درهم
    </div>

    <input id="name" placeholder="أدخل اسمك هنا..." />

    <button class="btn-whatsapp" onclick="send()">
