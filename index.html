<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADHEN CREPES | Premium Taste</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;800&display=swap" rel="stylesheet">

<style>

:root{
--primary:#ff9f1c;
--dark:#0f1014;
--card:#1c1e26;
--text:#fff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0f1014;
color:#fff;
font-family:'Tajawal',sans-serif;
text-align:center;
overflow-x:hidden;
padding-bottom:120px;
}

/* HEADER */

header{
padding:40px 20px;
}

.logo{
font-size:3rem;
font-weight:800;
color:var(--primary);
opacity:0;
transform:translateY(40px);
animation:fadeUp 1s forwards;
}

.tagline{
color:#aaa;
margin-top:10px;
opacity:0;
animation:fadeUp 1s forwards .3s;
}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}

/* MENU */

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
margin-top:40px;
opacity:0;
transform:translateY(40px);
transition:1s;
}

.menu.show{
opacity:1;
transform:translateY(0);
}

.card{
background:var(--card);
border-radius:18px;
overflow:hidden;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 10px 25px rgba(255,159,28,.2);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-content{
padding:18px;
text-align:right;
}

.card h3{
margin-bottom:10px;
}

.price{
background:rgba(255,159,28,.15);
color:var(--primary);
padding:6px 12px;
border-radius:20px;
font-weight:bold;
}

/* CART BUTTON */

.cart-btn{
position:fixed;
bottom:25px;
left:50%;
transform:translateX(-50%);
background:linear-gradient(45deg,#ff9f1c,#ff7a00);
padding:14px 35px;
border-radius:40px;
cursor:pointer;
display:flex;
align-items:center;
gap:10px;
font-weight:bold;
box-shadow:0 10px 20px rgba(255,122,0,.3);
}

.counter{
background:#fff;
color:#ff7a00;
width:22px;
height:22px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:13px;
}

/* CART */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
opacity:0;
pointer-events:none;
transition:.3s;
}

.overlay.active{
opacity:1;
pointer-events:auto;
}

.cart{
position:fixed;
top:0;
left:-100%;
width:100%;
max-width:380px;
height:100vh;
background:#16181f;
padding:25px;
transition:.4s;
display:flex;
flex-direction:column;
}

.cart.open{
left:0;
}

.cart-header{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.close{
background:none;
border:none;
color:#fff;
font-size:22px;
cursor:pointer;
}

.cart-items{
flex:1;
overflow:auto;
}

.cart-item{
background:rgba(255,255,255,.05);
padding:12px;
border-radius:10px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
}

.total{
font-size:20px;
color:var(--primary);
margin:10px 0;
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
margin-top:10px;
background:#222;
color:#fff;
}

.send{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:#25d366;
color:#fff;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<h1 class="logo">ADHEN CREPES</h1>
<p class="tagline">أفضل كريب في المدينة</p>
</header>

<div class="container">
<div class="menu" id="menu"></div>
</div>

<div class="cart-btn" onclick="toggleCart()">
🛒 الطلب
<div class="counter" id="counter">0</div>
</div>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<div class="cart" id="cart">

<div class="cart-header">
<h2>طلبك</h2>
<button class="close" onclick="toggleCart()">✕</button>
</div>

<div class="cart-items" id="items"></div>

<div class="total">
المجموع: <span id="total">0</span> درهم
</div>

<input id="name" placeholder="اسمك">

<button class="send" onclick="send()">إرسال الطلب عبر WhatsApp</button>

</div>

<script>

const foods=[

{name:"كريب لوتس",price:18,img:"https://images.unsplash.com/photo-1519671482749-fd09be7ccebf?auto=format&fit=crop&w=400&q=80"},

{name:"كريب نوتيلا",price:15,img:"https://images.unsplash.com/photo-1587731556938-38755b4803a6?auto=format&fit=crop&w=400&q=80"},

{name:"عصير فراولة",price:15,img:"https://images.unsplash.com/photo-1553530666-ba11a7da3888?auto=format&fit=crop&w=400&q=80"}

]

let order={}
let total=0

const menu=document.getElementById("menu")

function renderMenu(){

let html=""

foods.forEach((f,i)=>{

html+=`
<div class="card" onclick="add('${f.name}',${f.price})">

<img src="${f.img}">

<div class="card-content">

<h3>${f.name}</h3>

<span class="price">${f.price} درهم</span>

</div>

</div>
`

})

menu.innerHTML=html

}

function add(name,price){

if(order[name]) order[name]++
else order[name]=1

update()

}

function remove(name){

order[name]--

if(order[name]<=0) delete order[name]

update()

}

function update(){

let items=document.getElementById("items")
let counter=document.getElementById("counter")

items.innerHTML=""
total=0
let count=0

for(let i in order){

let food=foods.find(f=>f.name==i)
let price=food.price*order[i]

total+=price
count+=order[i]

items.innerHTML+=`

<div class="cart-item">

<span>${order[i]} × ${i}</span>

<span>${price}dh</span>

</div>
`

}

counter.innerText=count
document.getElementById("total").innerText=total

}

function toggleCart(){

document.getElementById("cart").classList.toggle("open")
document.getElementById("overlay").classList.toggle("active")

}

function send(){

let name=document.getElementById("name").value

if(!name){
alert("ادخل اسمك")
return
}

let msg="مرحبا، اسمي "+name+"%0A%0Aالطلب:%0A"

for(let i in order){

msg+=order[i]+" × "+i+"%0A"

}

msg+="%0Aالمجموع: "+total+" درهم"

window.open("https://wa.me/212774475007?text="+msg)

}

renderMenu()

setTimeout(()=>{

menu.classList.add("show")

},300)

</script>

</body>
</html>
