<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khatra Coffee</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
    --gold: #c68b59;
    --dark: #050505;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    background: var(--dark);
    color: #fff;
    font-family: 'Montserrat', sans-serif;
}

/* NAV */
nav {
    position: fixed;
    width: 100%;
    padding: 20px 5%;
    display: flex;
    justify-content: space-between;
    backdrop-filter: blur(10px);
    z-index: 100;
}
.logo {
    font-family: 'Playfair Display', serif;
    color: var(--gold);
}

/* HERO */
.hero {
    height: 100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
    url('https://images.unsplash.com/photo-1541167760496-1628856ab772?q=80&w=2070');
    background-size: cover;
}

.hero h1 {
    font-size: 60px;
    font-family: 'Playfair Display';
}
.hero span { color: var(--gold); }

/* BUTTON */
.btn {
    margin-top:20px;
    padding:15px 35px;
    border:1px solid var(--gold);
    color: var(--gold);
    cursor:pointer;
    transition:0.3s;
}
.btn:hover {
    background: var(--gold);
    color:#000;
}

/* SECTION */
.section { padding:100px 5%; }

.menu-grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:30px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.03);
    padding:30px;
    border-radius:10px;
    text-align:center;
    transition:0.3s;
}
.card:hover {
    transform: translateY(-10px);
    border:1px solid var(--gold);
}

.price { color: var(--gold); }

/* CART ICON */
.cart-icon {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--gold);
    color: #000;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size: 24px;
    cursor:pointer;
    box-shadow: 0 0 15px rgba(198,139,89,0.6);
}

#badge {
    position:absolute;
    top:-5px;
    right:-5px;
    background:#fff;
    color:#000;
    font-size:12px;
    width:20px;
    height:20px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CART BOX */
.cart {
    position: fixed;
    bottom: 100px;
    right: 20px;
    width: 300px;
    background: #000;
    border:1px solid var(--gold);
    border-radius:10px;
    padding:20px;
    display:none;
}

.cart.active {
    display:block;
}

#cart-items {
    max-height:150px;
    overflow-y:auto;
    margin:10px 0;
}

.cart-item {
    display:flex;
    justify-content:space-between;
    margin-bottom:8px;
}

.remove {
    color:red;
    cursor:pointer;
}

/* TOTAL */
.total {
    color: var(--gold);
    font-weight:bold;
    margin:10px 0;
}

</style>
</head>

<body>

<nav>
<div class="logo">KHATRA خترة</div>
<div class="btn" onclick="scrollToMenu()">Menu</div>
</nav>

<div class="hero">
<h1>Khatra <span>Coffee</span></h1>
<p>Taste the energy</p>
<div class="btn" onclick="scrollToMenu()">Explore</div>
</div>

<div class="section" id="menu">
<h2 style="text-align:center; margin-bottom:40px;">Our Selection</h2>

<div class="menu-grid">

<div class="card">
<h3>Espresso</h3>
<p>Strong & pure</p>
<div class="price">15 MAD</div>
<div class="btn" onclick="addItem('Espresso',15)">Add</div>
</div>

<div class="card">
<h3>Cappuccino</h3>
<p>Creamy & smooth</p>
<div class="price">22 MAD</div>
<div class="btn" onclick="addItem('Cappuccino',22)">Add</div>
</div>

<div class="card">
<h3>Latte</h3>
<p>Luxury taste</p>
<div class="price">25 MAD</div>
<div class="btn" onclick="addItem('Latte',25)">Add</div>
</div>

</div>
</div>

<!-- CART ICON -->
<div class="cart-icon" onclick="toggleCart()">
🛒
<div id="badge">0</div>
</div>

<!-- CART BOX -->
<div class="cart" id="cartBox">
<h3>🛒 Order</h3>
<div id="cart-items"></div>
<div class="total" id="total">0 MAD</div>
<button class="btn" style="width:100%;" onclick="checkout()">Checkout</button>
</div>

<script>
let cart = [];
let total = 0;

function scrollToMenu(){
    document.getElementById('menu').scrollIntoView({behavior:'smooth'});
}

function toggleCart(){
    document.getElementById("cartBox").classList.toggle("active");
}

function addItem(name, price){
    cart.push({name, price});
    total += price;
    renderCart();
}

function removeItem(index){
    total -= cart[index].price;
    cart.splice(index,1);
    renderCart();
}

function renderCart(){
    const container = document.getElementById("cart-items");

    container.innerHTML = cart.map((item, i) => `
        <div class="cart-item">
            <span>${item.name}</span>
            <span>${item.price} MAD 
                <span class="remove" onclick="removeItem(${i})">✕</span>
            </span>
        </div>
    `).join("");

    document.getElementById("total").innerText = total + " MAD";
    document.getElementById("badge").innerText = cart.length;
}

function checkout(){
    if(cart.length === 0){
        alert("Add items first");
        return;
    }

    let items = cart.map(i => `${i.name} (${i.price} MAD)`).join(", ");
    let msg = "Order: " + items + " | Total: " + total + " MAD";

    window.open("https://wa.me/212678673336?text=" + encodeURIComponent(msg), "_blank");
}
</script>

</body>
</html>
