<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khatra | Ultra Premium Coffee</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c68b59; --dark: #0a0a0a; }
        
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Montserrat', sans-serif; }
        body { background: var(--dark); color: #fff; line-height: 1.6; overflow-x: hidden; }

        /* Cinematic Hero */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1541167760496-1628856ab772?q=80&w=2070'); /* Remplacer par l'URL de ton image */
            background-size: cover;
            background-position: center;
            padding: 20px;
        }

        .hero h1 { font-family: 'Playfair Display', serif; font-size: 80px; color: var(--gold); text-transform: uppercase; }
        .hero p { font-size: 1.2rem; margin-bottom: 30px; letter-spacing: 4px; opacity: 0.9; }

        .btn {
            padding: 18px 45px;
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: 0.5s;
            font-weight: 600;
            border-radius: 5px;
        }
        .btn:hover { background: var(--gold); color: #000; box-shadow: 0 0 30px var(--gold); }

        /* Menu Section */
        .section { padding: 100px 10%; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }
        
        .card {
            background: rgba(255, 255, 255, 0.03);
            padding: 40px;
            border: 1px solid rgba(198, 139, 89, 0.2);
            backdrop-filter: blur(15px);
            text-align: center;
            transition: 0.5s;
            border-radius: 10px;
        }
        .card:hover { transform: translateY(-20px); border-color: var(--gold); background: rgba(198, 139, 89, 0.05); }
        .card h3 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 24px; margin-bottom: 15px; }

        /* Cart Floating */
        .cart-box { position: fixed; bottom: 30px; right: 30px; background: rgba(0,0,0,0.9); padding: 25px; border: 1px solid var(--gold); border-radius: 15px; z-index: 999; }
        
        @media (max-width: 768px) { .hero h1 { font-size: 45px; } }
    </style>
</head>
<body>

<div class="hero">
    <h1>Khatra Coffee</h1>
    <p>TASTE THE ENERGY</p>
    <button class="btn" onclick="document.getElementById('menu').scrollIntoView({behavior:'smooth'})">Discover Menu</button>
</div>

<div class="section" id="menu">
    <h2 style="font-family: 'Playfair Display', serif; text-align: center; margin-bottom: 60px; font-size: 48px; color: var(--gold);">Our Selection</h2>
    <div class="menu-grid">
        <div class="card" onclick="add('Espresso Elite')">
            <h3>Espresso Elite</h3>
            <p>Intense, bold, and pure.</p>
            <h4 style="margin-top:20px; color:var(--gold);">15 MAD</h4>
        </div>
        <div class="card" onclick="add('Cappuccino')">
            <h3>Cappuccino</h3>
            <p>Velvety foam, rich espresso.</p>
            <h4 style="margin-top:20px; color:var(--gold);">22 MAD</h4>
        </div>
        <div class="card" onclick="add('Signature Latte')">
            <h3>Signature Latte</h3>
            <p>Creamy perfection in a cup.</p>
            <h4 style="margin-top:20px; color:var(--gold);">25 MAD</h4>
        </div>
    </div>
</div>

<div class="cart-box">
    <h3>🛒 Your Order</h3>
    <div id="cart-list" style="margin: 15px 0;"></div>
    <button class="btn" style="width:100%; padding:10px; font-size:12px;" onclick="checkout()">Checkout via WhatsApp</button>
</div>

<script>
    let cart = [];
    function add(item) { cart.push(item); render(); }
    function render() {
        document.getElementById("cart-list").innerHTML = cart.map(c => `<div style="margin-bottom:5px;">☕ ${c}</div>`).join("");
    }
    function checkout() {
        let msg = "Order Request: " + cart.join(", ");
        window.location.href = "https://wa.me/212678673336?text=" + encodeURIComponent(msg);
    }
</script>

</body>
</html>
