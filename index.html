<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khatra | خترة - Ultra Premium Coffee</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@200;300;400;600&family=Amiri:wght@400;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>

<style>
:root { 
    --gold: #c68b59;
    --gold-glow: rgba(198, 139, 89, 0.4);
    --dark: #050505; 
    --card-bg: rgba(198, 139, 89, 0.05);
}

* { margin:0; padding:0; box-sizing:border-box; }
body { 
    background: var(--dark); 
    color: #fff; 
    font-family: 'Montserrat', sans-serif; 
    overflow-x: hidden; 
    cursor: none;
}

/* Cursor */
.cursor {
    position: fixed; width: 20px; height: 20px;
    border: 1px solid var(--gold); border-radius: 50%;
    pointer-events: none; z-index: 10000;
    transform: translate(-50%, -50%);
    mix-blend-mode: difference;
}

/* Navbar */
nav {
    position: fixed; top: 0; width: 100%;
    padding: 20px 5%;
    display: flex; justify-content: space-between;
    backdrop-filter: blur(10px);
}
.logo { font-family: 'Playfair Display'; color: var(--gold); }

/* Hero */
.hero {
    height: 100vh;
    display:flex; flex-direction:column;
    justify-content:center; align-items:center;
    text-align:center;
}
.hero-bg {
    position:absolute; inset:0;
    background:url('https://images.unsplash.com/photo-1541167760496-1628856ab772?q=80&w=2070') center/cover;
    filter:brightness(0.3);
    z-index:-1;
}
.hero h1 {
    font-family:'Playfair Display';
    font-size:7vw;
}
.gold-text { color: var(--gold); }

.btn {
    padding:15px 35px;
    border:1px solid var(--gold);
    color:#fff;
    cursor:pointer;
    margin-top:20px;
}

/* Menu */
.section { padding:120px 5%; }
.menu-grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:30px;
}

.card {
    background: var(--card-bg);
    padding:30px;
    border-radius:15px;
    text-align:center;
    transition:0.4s;
}
.card:hover {
    transform: translateY(-10px);
    border:1px solid var(--gold);
}

.price { color: var(--gold); }

/* Cart */
.cart-box {
    position:fixed;
    bottom:20px; right:20px;
    background:#000;
    padding:20px;
    border:1px solid var(--gold);
    border-radius:10px;
}

@media (max-width:768px){
    body { cursor:auto; }
    .cursor { display:none; }
}
</style>
</head>

<body>

<div class="cursor"></div>

<nav>
<div class="logo">KHATRA <span>خترة</span></div>
<div class="btn" onclick="document.getElementById('menu').scrollIntoView({behavior:'smooth'})">Menu</div>
</nav>

<div class="hero">
<div class="hero-bg"></div>
<h1>Experience <br><span class="gold-text">The Energy</span></h1>
<p>Ultra Premium Moroccan Coffee</p>
<div class="btn" onclick="document.getElementById('menu').scrollIntoView({behavior:'smooth'})">Explore</div>
</div>

<div class="section" id="menu">
<h2 style="text-align:center; font-family:'Playfair Display'; margin-bottom:40px;">
Our <span style="color:var(--gold)">Selection</span>
</h2>

<div class="menu-grid">

<div class="card" onclick="add('Espresso Elite',15)">
<h3>Espresso Elite</h3>
<p>Strong & pure</p>
<div class="price">15 MAD</div>
<div class="btn" onclick="event.stopPropagation(); add('Espresso Elite',15)">Add</div>
</div>

<div class="card" onclick="add('Cappuccino',22)">
<h3>Cappuccino</h3>
<p>Creamy & smooth</p>
<div class="price">22 MAD</div>
<div class="btn" onclick="event.stopPropagation(); add('Cappuccino',22)">Add</div>
</div>

<div class="card" onclick="add('Latte',25)">
<h3>Signature Latte</h3>
<p>Luxury taste</p>
<div class="price">25 MAD</div>
<div class="btn" onclick="event.stopPropagation(); add('Latte',25)">Add</div>
</div>

</div>
</div>

<div class="cart-box">
<h3>🛒 Order</h3>
<div id="cart-list"></div>
<div id="total">0 MAD</div>
<button class="btn" onclick="checkout()">Checkout</button>
</div>

<script>
// Cursor
const cursor = document.querySelector('.cursor');
document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
});

// Cart
let cart = [];
let total = 0;

function add(name, price){
    cart.push(name);
    total += price;
    render();
}

function render(){
    document.getElementById("cart-list").innerHTML =
        cart.map(c => `<div>☕ ${c}</div>`).join("");
    document.getElementById("total").innerText = total + " MAD";
}

function checkout(){
    if(cart.length === 0) return alert("Add items first");
    let msg = "Order: " + cart.join(", ") + " | Total: " + total + " MAD";
    window.open("https://wa.me/212678673336?text=" + encodeURIComponent(msg));
}
</script>

</body>
</html>
