<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pneus Maroc - Galerie Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#0f172a;
color:white;
}

.container{
width:90%;
max-width:1200px;
margin:auto;
padding:40px 0;
}

h1{
text-align:center;
font-size:42px;
}

.search{
width:100%;
padding:15px;
border-radius:10px;
border:none;
margin-top:20px;
font-size:16px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
margin-top:40px;
}

.card{
background:#1e293b;
border-radius:15px;
overflow:hidden;
transition:0.3s;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.card:hover{transform:translateY(-8px);}

.card img{
width:100%;
height:170px;
object-fit:cover;
display:block;
}

.content{
padding:15px;
}

.brand{
color:#38bdf8;
font-weight:bold;
font-size:18px;
margin-bottom:10px;
}

.size{
display:block;
color:#facc15;
font-size:13px;
margin:3px 0;
}

.btn{
width:100%;
margin-top:10px;
padding:10px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
cursor:pointer;
}

.btn:hover{background:#2563eb;}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
font-size:22px;
color:white;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<h1>🛞 Galerie Pneus Maroc</h1>

<input class="search" id="search" placeholder="Rechercher voiture ou taille..." onkeyup="filterCars()">

<div class="grid" id="grid"></div>

</div>

<a class="whatsapp" href="#" onclick="openWhatsApp()">💬</a>

<script>

// 📊 DATABASE (IMAGES FIXED CDN)

const cars = [

{
brand:"Renault Clio 4 / 5",
img:"https://images.unsplash.com/photo-1549921296-3a6b9b5b2f3b?auto=format&fit=crop&w=1000&q=80",
sizes:["185/65 R15","195/55 R16"]
},

{
brand:"Renault Megane",
img:"https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=1000&q=80",
sizes:["195/65 R15","205/55 R16","225/45 R17"]
},

{
brand:"Dacia Duster",
img:"https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2?auto=format&fit=crop&w=1000&q=80",
sizes:["215/65 R16","215/60 R17","225/60 R17"]
},

{
brand:"VW Golf",
img:"https://images.unsplash.com/photo-1619767886558-efdc259cde1a?auto=format&fit=crop&w=1000&q=80",
sizes:["195/65 R15","205/55 R16","225/45 R17","225/40 R18"]
},

{
brand:"Peugeot 208",
img:"https://images.unsplash.com/photo-1552519507-da3b142c6e3d?auto=format&fit=crop&w=1000&q=80",
sizes:["185/65 R15","195/55 R16"]
},

{
brand:"Toyota Corolla",
img:"https://images.unsplash.com/photo-1606016159991-dfe4f2746ad5?auto=format&fit=crop&w=1000&q=80",
sizes:["195/65 R15","205/55 R16","225/45 R17"]
},

{
brand:"Hyundai Tucson",
img:"https://images.unsplash.com/photo-1606664515524-ed2f786a0bd6?auto=format&fit=crop&w=1000&q=80",
sizes:["225/60 R17","225/55 R18","235/55 R19"]
}

];

// 🎨 render
function render(list){

let grid=document.getElementById("grid");
grid.innerHTML="";

list.forEach(car=>{

grid.innerHTML += `
<div class="card">

<img src="${car.img}" alt="${car.brand}">

<div class="content">

<div class="brand">${car.brand}</div>

<div>🛞 Tailles:</div>
${car.sizes.map(s=>`<span class="size">${s}</span>`).join("")}

<button class="btn" onclick="order('${car.brand}')">
Commander
</button>

</div>

</div>
`;

});

}

// 🔎 search
function filterCars(){

let input=document.getElementById("search").value.toLowerCase();

let filtered=cars.filter(c =>
c.brand.toLowerCase().includes(input) ||
c.sizes.some(s=>s.toLowerCase().includes(input))
);

render(filtered);

}

// 💬 WhatsApp
function order(car){

let phone="212622251754";
let msg="Bonjour, je veux des pneus pour: "+car;

window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);

}

function openWhatsApp(){

let phone="212622251754";
let msg="Bonjour, je cherche des pneus.";

window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);

}

// init
render(cars);

</script>

</body>
</html>
