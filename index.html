<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pneus Maroc - أفضل العجلات لسيارتك</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            background: rgba(0,0,0,0.9);
            padding: 1rem 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(45deg, #ff6b35, #f7931e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-box {
            flex: 1;
            max-width: 500px;
            margin: 0 2rem;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 12px 50px 12px 20px;
            border: none;
            border-radius: 50px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 1rem;
            backdrop-filter: blur(10px);
        }

        .search-input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        .search-btn {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #ff6b35;
            font-size: 1.2rem;
        }

        .whatsapp-btn {
            background: linear-gradient(45deg, #25D366, #128C7E);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .whatsapp-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(37,211,102,0.4);
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"><rect fill="%230f0f23" width="1200" height="800"/><circle fill="%23ff6b35" opacity="0.1" cx="200" cy="200" r="150"/><circle fill="%23f7931e" opacity="0.1" cx="1000" cy="600" r="200"/><path fill="%231a1a2e" opacity="0.3" d="M0 400Q300 200 600 400T1200 400V800H0z"/></svg>');
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }

        .hero-content h1 {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(45deg, #ffffff, #ff6b35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-content p {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        .cta-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .cta-primary, .cta-secondary {
            padding: 18px 40px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cta-primary {
            background: linear-gradient(45deg, #ff6b35, #f7931e);
            color: white;
        }

        .cta-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(255,107,53,0.4);
        }

        .cta-secondary {
            background: transparent;
            color: white;
            border: 2px solid #ff6b35;
        }

        .cta-secondary:hover {
            background: #ff6b35;
            transform: translateY(-3px);
        }

        /* Cars Section */
        .cars-section {
            padding: 100px 0;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .section-title {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 4rem;
            background: linear-gradient(45deg, #ff6b35, #f7931e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .cars-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
        }

        .car-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 2rem;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .car-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #ff6b35, #f7931e, #25D366);
        }

        .car-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .car-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 1.5rem;
        }

        .car-name {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #ffffff;
        }

        .tire-sizes {
            background: rgba(255,107,53,0.2);
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
        }

        .tire-size {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 6px 12px;
            margin: 4px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .order-btn {
            width: 100%;
            background: linear-gradient(45deg, #25D366, #128C7E);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .order-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(37,211,102,0.4);
        }

        /* No Results */
        .no-results {
            text-align: center;
            padding: 4rem;
            display: none;
        }

        .no-results.show {
            display: block;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero-content h1 {
                font-size: 2.5rem;
            }
            
            .nav-container {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }
            
            .search-box {
                margin: 0;
                order: 3;
                width: 100%;
            }
            
            .cta-buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .cars-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .car-card {
            animation: fadeInUp 0.6s ease forwards;
        }

        .car-card:nth-child(1) { animation-delay: 0.1s; }
        .car-card:nth-child(2) { animation-delay: 0.2s; }
        .car-card:nth-child(3) { animation-delay: 0.3s; }
        .car-card:nth-child(4) { animation-delay: 0.4s; }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-car-side"></i> Pneus Maroc
            </div>
            <div class="search-box">
                <button class="search-btn">
                    <i class="fas fa-search"></i>
                </button>
                <input type="text" class="search-input" placeholder="ابحث بالسيارة أو مقاس العجلة... (R16, 195/65...)">
            </div>
            <button class="whatsapp-btn" onclick="openWhatsApp()">
                <i class="fab fa-whatsapp"></i>
                اطلب واتساب
            </button>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>🛞 أفضل العجلات لسيارتك</h1>
            <p>مستودع كامل لجميع أنواع الـ Pneus • توصيل سريع • أسعار تنافسية</p>
            <div class="cta-buttons">
                <button class="cta-primary" onclick="scrollToCars()">
                    <i class="fas fa-car"></i>
                    تصفح السيارات
                </button>
                <button class="cta-secondary" onclick="openWhatsApp()">
                    <i class="fab fa-whatsapp"></i>
                    اطلب الآن
                </button>
            </div>
        </div>
    </section>

    <!-- Cars Section -->
    <section class="cars-section" id="cars">
        <h2 class="section-title">جميع السيارات المتوفرة</h2>
        
        <div class="no-results">
            <i class="fas fa-search" style="font-size: 4rem; color: #666; margin-bottom: 1rem;"></i>
            <h3>لا توجد نتائج</h3>
            <p>جرب البحث باسم السيارة أو مقاس العجلة</p>
        </div>

        <div class="cars-grid" id="carsGrid">
            <!-- سيارات سيتم تحميلها ديناميكياً -->
        </div>
    </section>

    <script>

            },

            },

            },
            {

                image: "https://images.unsplash.com/photo-1542158822-aec7b4f2b5d1?w=400&h=250&fit=crop",

            {

                image: "https://images.unsplash.com/photo-1552519507-da3b142c6e3d?w=400&h=250&fit=crop",
                sizes: ["235/60 R18", "245/55 R19"]
            }
        ];

        let allCars = [...carsData];

        // دالة تحميل السيارات
        function loadCars(cars) {
            const grid = document.getElementById('carsGrid');
            const noResults = document.querySelector('.no-results');
            
            grid.innerHTML = '';
            
            if (cars.length === 0) {
                noResults.classList.add('show');
                return;
            }
            
            noResults.classList.remove('show');
            
            cars.forEach(car => {
                const card = createCarCard(car);
                grid.appendChild(card);
            });
        }

        // إنشاء كارد السيارة
        function createCarCard(car) {
            const card = document.createElement('div');
            card.className = 'car-card';
            card.innerHTML = `
                <img src="${car.image}" alt="${car.name}" class="car-image" loading="lazy">
                <h3 class="car-name">${car.name}</h3>
                <div class="tire-sizes">
                    ${car.sizes.map
